<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>צפייה בעיתון — סולן הדפסות</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root { --press:#2d3561; --press-d:#222a4d; --gold:#c9a84c; --gold-light:#e8d5a3; --line:#e5e7eb; --ink:#1f2937; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Heebo',system-ui,"Segoe UI",Arial,sans-serif; color:var(--ink);
         background:linear-gradient(180deg,#eef1f6 0%,#f5f6f9 100%); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  .brandbar { width:100%; background:linear-gradient(135deg,var(--press) 0%,var(--press-d) 100%); color:#fff;
    padding:14px 20px; box-shadow:0 4px 18px rgba(45,53,97,.28); display:flex; align-items:center; justify-content:center;
    gap:13px; position:relative; margin-bottom:12px; }
  .brandbar::after { content:''; position:absolute; left:0; right:0; bottom:0; height:3px;
    background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold)); }
  .brandbar .logo { width:42px; height:42px; border-radius:11px; background:rgba(255,255,255,.1);
    border:1.5px solid rgba(201,168,76,.6); display:flex; align-items:center; justify-content:center; font-size:1.35rem; }
  .brandbar h1 { font-size:1.3rem; font-weight:900; margin:0; } .brandbar h1 span { color:var(--gold); }
  .brandbar .tag { font-size:.8rem; color:var(--gold-light); margin-top:1px; }
  header { text-align:center; margin-bottom:8px; padding:0 10px; }
  header h1 { font-size:1.05rem; font-weight:800; margin:0; color:var(--press); } header .sub { color:#6b7280; font-size:.85rem; margin-top:3px; }
  #viewer { width:100%; max-width:1500px; background:#fff; border-radius:10px; }
  /* gap:0 — העמודים נוגעים נטו-לנטו בקו האמצע, כך שתמונה הנפרשת על כפולה מתחברת ברצף */
  #spread { display:flex; gap:0; justify-content:center; background:#d1d5db; padding:10px; border-radius:8px;
            min-height:55vh; align-items:center; box-shadow:0 4px 16px rgba(0,0,0,.18); }
  #spread .page { display:inline-flex; flex-direction:column; align-items:center; gap:5px; line-height:0; }
  /* בלי צל פר-עמוד — צל פנימי היה יוצר "תפר" בין שני העמודים */
  #spread img { display:block; height:80vh; width:auto; max-width:48vw; background:#fff; box-shadow:none; }
  /* תצוגת "גלישות": חותכים ל-TrimBox רק בצד השדרה (כדי שהכפולה תתחבר נקי), ובצדדים החיצוניים
     מציגים את הבליד + צלבי החיתוך של הקובץ + מסגרת קו-חיתוך (TrimBox) — כדי לבדוק שיש גלישות */
  #spread .cropwrap { position:relative; display:inline-block; line-height:0; }
  #spread .mediacrop { display:block; height:80vh; width:auto; max-width:48vw; background-color:#fff; background-repeat:no-repeat; }
  #spread .trimframe { position:absolute; box-sizing:border-box; pointer-events:none; }  /* מסגרת trim מקווקוות (border נקבע inline, מדלג על השדרה) */
  /* מספר עמוד — תווית עזר מתחת לעמוד ובשקיפות (לא חלק מהעיתון) */
  #spread .pgnum { line-height:1; color:#6b7280; opacity:.5; font-size:.82rem; font-weight:700; }
  #spread .ph { color:#6b7280; font-size:.95rem; padding:50px; }
  #vnav { display:flex; align-items:center; justify-content:center; gap:14px; margin:10px 0; flex-wrap:wrap; }
  #vnav button { font-size:1rem; padding:8px 16px; border:1.5px solid var(--line); background:#fff; border-radius:8px; cursor:pointer; }
  #vnav button:disabled { opacity:.35; cursor:default; }
  #vlabel { min-width:130px; text-align:center; font-variant-numeric:tabular-nums; font-size:.9rem; }
  #viewer:fullscreen { background:#111; display:flex; flex-direction:column; justify-content:center; padding:6px; }
  #viewer:fullscreen #spread { background:#111; flex:1; min-height:0; padding:4px; }
  #viewer:fullscreen #spread img { height:auto; width:auto; max-height:90vh; max-width:48vw; }
  #viewer:fullscreen #spread .page:only-child img { max-width:94vw; max-height:92vh; }
  #viewer:fullscreen #spread .mediacrop { height:88vh; max-height:92vh; max-width:48vw; }
  #viewer:fullscreen #spread .page:only-child .mediacrop { height:90vh; max-width:94vw; }
  #viewer:fullscreen #vlabel { color:#fff; }
  #overlay { position:fixed; inset:0; background:rgba(255,255,255,.95); display:flex; align-items:center;
             justify-content:center; flex-direction:column; gap:12px; z-index:50; text-align:center; padding:24px; white-space:pre-line; }
  #ovBar { width:280px; max-width:80vw; height:12px; background:var(--line); border-radius:7px; overflow:hidden; display:none; }
  #ovBar > div { height:100%; width:0; background:linear-gradient(90deg,#2d3561,#16a34a); transition:width .15s; }
  .parts-pick { display:flex; flex-direction:column; gap:10px; max-width:480px; width:100%; }
  .parts-pick a { display:block; padding:14px 18px; background:#fff; border:1.5px solid var(--line); border-radius:10px;
    text-decoration:none; color:var(--press); font-weight:800; font-size:1rem; text-align:center; }
  @media (max-width:680px){ #spread img{height:auto;max-height:60vh;width:auto;max-width:96vw} #spread .mediacrop{height:56vh;max-width:96vw} }
</style>
</head>
<body>
<div id="overlay"><div id="ovText">טוען עיתון…</div><div id="ovBar"><div></div></div></div>
<div class="brandbar">
  <div class="logo">🖨️</div>
  <div style="text-align:center">
    <h1>סולן הדפסות <span>בע"מ</span></h1>
    <div class="tag">צפייה בעיתון — סדר עמודים מאושר</div>
  </div>
</div>
<header>
  <h1 id="ttl">👁 צפייה בעיתון</h1>
  <div class="sub" id="sub">סולן הדפסות</div>
</header>

<div id="viewer" class="hidden">
  <div id="spread"><div class="ph">טוען…</div></div>
  <div id="vnav">
    <button id="vprev">‹ הקודם</button>
    <span id="vlabel"></span>
    <button id="vnext">הבא ›</button>
    <button id="vfs">⛶ מסך מלא</button>
  </div>
</div>

<div id="picker" class="hidden" style="padding:10px"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const _FBURL = 'https://solan-printing-default-rtdb.europe-west1.firebasedatabase.app';
// ── הזדהות אנונימית מול Firebase (מנעול אבטחה) ──
const _FB_APIKEY = 'AIzaSyAFp99furP4L5hqTI-horBHmGZC9s13dGg';
let _fbTok = null, _fbTokExp = 0, _fbTokP = null;
async function _fbAuthToken(){
  if (_fbTok && Date.now() < _fbTokExp - 120000) return _fbTok;
  if (_fbTokP) return _fbTokP;
  _fbTokP = (async function(){
    try {
      let j = null, rt = null; try { rt = localStorage.getItem('solanFbAnonRT'); } catch(e){}
      if (rt) {
        const r = await fetch('https://securetoken.googleapis.com/v1/token?key='+_FB_APIKEY, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:'grant_type=refresh_token&refresh_token='+encodeURIComponent(rt) });
        if (r.ok) { const d = await r.json(); j = { token:d.id_token, rt:d.refresh_token, exp:Date.now()+(parseInt(d.expires_in)||3600)*1000 }; }
      }
      if (!j) {
        const r = await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key='+_FB_APIKEY, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({returnSecureToken:true}) });
        if (r.ok) { const d = await r.json(); j = { token:d.idToken, rt:d.refreshToken, exp:Date.now()+(parseInt(d.expiresIn)||3600)*1000 }; }
      }
      if (j) { _fbTok = j.token; _fbTokExp = j.exp; try { localStorage.setItem('solanFbAnonRT', j.rt); } catch(e){} _fbTokP = null; return _fbTok; }
    } catch(e){}
    _fbTokP = null; return null;
  })();
  return _fbTokP;
}
async function _au(url){ const t = await _fbAuthToken(); return t ? url + (url.indexOf('?')>=0?'&':'?') + 'auth=' + t : url; }
_fbAuthToken();
const RENDER_H = 1100;

const $ = id => document.getElementById(id);
const overlay = $('overlay');
function showOverlay(t, on=true, pct=null){
  $('ovText').textContent = t; overlay.style.display = on ? 'flex' : 'none';
  if (pct == null) $('ovBar').style.display = 'none';
  else { $('ovBar').style.display = 'block'; $('ovBar').firstElementChild.style.width = Math.round(pct) + '%'; }
}
const show = (id, on=true) => $(id).classList.toggle('hidden', !on);

const params = new URLSearchParams(location.search);
const proofId = params.get('id');
const partId  = params.get('part');
let imgs = [], metas = [], vIndex = 0;
let _pdfUrlForBoxes = '';   // כתובת ה-PDF לקריאת TrimBox (גם כשמוצג ממטמון מהיר)

// קריאת תיבות (MediaBox/TrimBox) מ-PDF דרך pdf-lib → אחוזי חיתוך (trimFrac) לכל עמוד
async function _trimFracsFromPdf(bytes){
  try {
    const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption:true });
    return doc.getPages().map(pg => {
      let mb, tb;
      try { mb = pg.getMediaBox(); } catch(e){}
      try { tb = pg.getTrimBox(); } catch(e){}
      if (!mb || !tb || !tb.width || !tb.height) return null;
      const l = (tb.x - mb.x) / mb.width,
            t = (mb.y + mb.height - (tb.y + tb.height)) / mb.height,
            w = tb.width / mb.width, h = tb.height / mb.height;
      if (l > 0.003 || t > 0.003 || w < 0.997 || h < 0.997)
        return { l: Math.max(0,l), t: Math.max(0,t), w: Math.min(1,w), h: Math.min(1,h), wmm: tb.width*25.4/72, hmm: tb.height*25.4/72 };
      return null;
    });
  } catch(e){ return []; }
}
// מפצל עמודי "כפולה" (רוחב ≈ פי-2 מהחציון) לשני עמודים בודדים לתצוגה תקינה (RTL: חצי ימין קודם). אידמפוטנטי.
async function splitSpreadsPdf(bytes){
  try {
    if (!(bytes instanceof Uint8Array)) { try { bytes = new Uint8Array(bytes); } catch(e){} }   // cross-realm safety
    const src = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption:true });
    const pages = src.getPages();
    if (!pages.length) return bytes;
    const ws = pages.map(p=>p.getWidth()).slice().sort((a,b)=>a-b);
    const med = ws[Math.floor(ws.length/2)] || 0;
    const isDbl = p => med>0 && p.getWidth() > med*1.5;
    if (!pages.some(isDbl)) return bytes;
    const out = await PDFLib.PDFDocument.create();
    for (let i=0;i<pages.length;i++){
      const sp = pages[i], w=sp.getWidth(), h=sp.getHeight();
      if (isDbl(sp)){
        const half=w/2;
        const embR = await out.embedPage(sp, { left:half, bottom:0, right:w, top:h }); out.addPage([half,h]).drawPage(embR);
        const embL = await out.embedPage(sp, { left:0, bottom:0, right:half, top:h }); out.addPage([half,h]).drawPage(embL);
      } else { const [cp] = await out.copyPages(src, [i]); out.addPage(cp); }
    }
    return await out.save();
  } catch(e){ console.warn('splitSpreadsPdf failed', e); return bytes; }
}
// טוען את תיבות ה-TrimBox ברקע (למסלול מטמון מהיר) ואז מרנדר מחדש עם חיתוך-נטו + מסגרת
async function _loadTrimsBg(){
  if (!_pdfUrlForBoxes || (metas && metas.length)) return;
  try {
    const buf = await (await fetch(await _au(_pdfUrlForBoxes))).arrayBuffer();
    const tf = await _trimFracsFromPdf(new Uint8Array(buf));
    if (tf && tf.length){ metas = tf; renderViewer(); }
  } catch(e){ /* נשאר בתצוגה רגילה */ }
}

(async function init(){
  if (!proofId) return fail('לא נמצא מזהה בכתובת.');
  let rec;
  try { rec = await (await fetch(await _au(`${_FBURL}/customerProofs/${proofId}.json`))).json(); }
  catch(e){ return fail('שגיאה בטעינה.'); }
  if (!rec) return fail('העיתון לא נמצא או הוסר.');
  $('sub').textContent = [rec.customer, rec.title].filter(Boolean).join(' · ') || 'סולן הדפסות';

  // איזה קובץ להציג: ריצה מסוימת (part), עיתון מלא, או בוחר ריצות
  let url = null, label = '';
  var cacheUrl = '', cacheAt = 0;
  if (partId && rec.parts && rec.parts[partId]) { var pt=rec.parts[partId]; url = pt.fileUrl; label = pt.name || ''; cacheUrl = pt.pagesUrl||''; cacheAt = pt.pagesReadyAt||0; }
  else if (rec.fileUrl) { url = rec.fileUrl; cacheUrl = rec.pagesUrl||''; cacheAt = rec.pagesReadyAt||0; }
  else if (rec.parts && Object.keys(rec.parts).length) {
    // עבודה לפי ריצות — הצג בורר ריצות לצפייה
    showOverlay('', false);
    const parts = Object.entries(rec.parts).sort((a,b)=>(a[1].approvedAt||0)-(b[1].approvedAt||0));
    $('picker').innerHTML = '<div class="parts-pick"><div style="text-align:center;font-weight:800;margin-bottom:4px">בחר/י ריצה לצפייה:</div>'
      + parts.map(([pid,p])=>`<a href="?id=${proofId}&part=${pid}">📄 ${esc(p.name||pid)} — ${p.pageCount||''} עמ'</a>`).join('')
      + '</div>';
    show('picker', true);
    return;
  } else { return fail('עדיין לא הועלה/אושר קובץ לעיתון זה.'); }

  if (label) $('ttl').textContent = 'צפייה — ' + label;

  _pdfUrlForBoxes = url;   // לקריאת TrimBox (חיתוך-נטו) גם במסלול מטמון מהיר

  // כמה כפולות בריצה (נשמר באישור) — קובע אם צריך לפצל אותן לתצוגה
  var _sprCount = ((partId && rec.parts && rec.parts[partId]) ? rec.parts[partId].spreadCount : rec.spreadCount) || 0;

  // ── פתיחה מהירה: מטמון מרונדר עדכני — רק כשאין כפולות (עם כפולות צריך לפצל ולרנדר מחדש) ──
  var FRESH_MS = 12 * 60 * 60 * 1000;
  if (_sprCount === 0 && cacheUrl && cacheAt && (Date.now() - cacheAt) < FRESH_MS) {
    try {
      showOverlay('טוען תצוגה מהירה…', true, 0);
      imgs = await (await fetch(cacheUrl)).json();
      if (Array.isArray(imgs) && imgs.length) {
        showOverlay('', false); show('viewer', true); renderViewer();
        _loadTrimsBg();   // מביא TrimBox ברקע → רינדור מחדש עם חיתוך-נטו + מסגרת
        return;
      }
    } catch(e){ console.warn('quick-cache failed, falling back to PDF render:', e); }
  }

  try {
    showOverlay('טוען עיתון…', true, 0);
    const rawBuf = await (await fetch(url)).arrayBuffer();
    const orig = new Uint8Array(rawBuf);
    let norm = orig;
    try { norm = await splitSpreadsPdf(orig); } catch(e){ norm = orig; }   // כפולה → 2 עמודים בודדים
    showOverlay('מרנדר עמודים…', true, 0);
    try { metas = await _trimFracsFromPdf(norm.slice(0)); } catch(e){ metas = []; }   // תיבות חיתוך לפני ש-pdf.js "בולע" את ה-buffer
    const pdf = await pdfjsLib.getDocument({ data: norm }).promise;
    imgs = new Array(pdf.numPages);
    for (let i = 1; i <= pdf.numPages; i++) {
      imgs[i-1] = await renderPage(pdf, i);
      showOverlay('מרנדר עמודים…', true, Math.round(i/pdf.numPages*100));
      if (i % 3 === 0) renderViewer();
    }
    showOverlay('', false); show('viewer', true); renderViewer();
  } catch(e){ console.error(e); fail('שגיאה בטעינת הקובץ.\n' + (e&&e.message||'')); }
})();

async function renderPage(pdf, pageNo){
  const page = await pdf.getPage(pageNo);
  const v1 = page.getViewport({ scale:1 });
  const scale = Math.min(2.5, RENDER_H / v1.height);
  const vp = page.getViewport({ scale });
  const c = document.createElement('canvas');
  c.width = Math.max(1, Math.floor(vp.width)); c.height = Math.max(1, Math.floor(vp.height));
  await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
  page.cleanup();
  return c.toDataURL('image/jpeg', 0.85);
}

// דפדוף כפולה RTL
function showingPages(){
  if (!imgs.length) return [];
  if (vIndex === 0) return [0];
  const left = vIndex % 2 === 1 ? vIndex : vIndex - 1;
  return [left, left + 1].filter(i => i < imgs.length);
}
function renderViewer(){
  const spread = $('spread');
  if (!imgs.length) return;
  const s = showingPages();
  $('vlabel').textContent = `עמוד ${s.map(i=>i+1).join('–')} מתוך ${imgs.length}`;
  $('vprev').disabled = vIndex <= 0;
  $('vnext').disabled = s[s.length-1] >= imgs.length - 1;
  const two = s.length === 2;
  spread.innerHTML = s.map((i, pos) => {
    const tf = metas[i];
    if (tf && (tf.w < 1 || tf.h < 1)) {
      // חותכים ל-TrimBox רק בצד השדרה (חיבור נקי); בצדדים החיצוניים מציגים בליד + צלבי חיתוך + מסגרת trim
      const spine = two ? (pos === 0 ? 'left' : 'right') : 'left';   // ימני(ראשון) שדרה שמאל · שמאלי שדרה ימין · שער יחיד = שדרה שמאל (נטו בצד הפנימי)
      const sp = _pageNetSpec(tf, spine);
      const mc = `aspect-ratio:${sp.arr.toFixed(4)};background-image:url('${imgs[i]}');`
        + `background-size:${sp.sizeW.toFixed(3)}% 100%;background-position:${sp.posX.toFixed(3)}% 0%;`;
      const f = sp.frame;
      const fb = `border:1.4px dashed #e11d48;`
        + (f.skip === 'left' ? 'border-left:none;' : '') + (f.skip === 'right' ? 'border-right:none;' : '');
      const fst = `left:${f.left.toFixed(2)}%;top:${f.top.toFixed(2)}%;width:${f.width.toFixed(2)}%;height:${f.height.toFixed(2)}%;${fb}`;
      return `<div class="page"><div class="cropwrap"><div class="mediacrop" style="${mc}"></div><div class="trimframe" style="${fst}"></div></div><div class="pgnum">עמוד ${i+1}</div></div>`;
    }
    return `<div class="page"><img src="${imgs[i]}" alt=""><div class="pgnum">עמוד ${i+1}</div></div>`;
  }).join('');
}
// חישוב אזור התצוגה (חיתוך שדרה בלבד) + מיקום מסגרת ה-trim בתוך העמוד, לפי TrimBox
function _pageNetSpec(tf, spine){
  const mediaHmm = tf.hmm / tf.h, mediaWmm = tf.wmm / tf.w;
  let shownL, shownR;
  if (spine === 'left'){ shownL = tf.l; shownR = 1; }            // חותך בליד שמאל (שדרה), מציג עד ימין
  else if (spine === 'right'){ shownL = 0; shownR = tf.l + tf.w; } // חותך בליד ימין (שדרה), מציג עד שמאל
  else { shownL = 0; shownR = 1; }                                 // עמוד יחיד — כל הבליד
  const shownW = shownR - shownL;
  const arr = (shownW * mediaWmm) / mediaHmm;
  const posX = shownW < 1 ? (shownL / (1 - shownW) * 100) : 0;
  const sizeW = 100 / shownW;
  const trimL = (tf.l - shownL) / shownW, trimR = (tf.l + tf.w - shownL) / shownW;
  return { arr, sizeW, posX, frame: { left: trimL*100, top: tf.t*100, width: (trimR-trimL)*100, height: tf.h*100, skip: spine } };
}
function step(d){
  if (vIndex === 0) vIndex = d > 0 ? 1 : 0;
  else vIndex = Math.max(0, Math.min(vIndex + d*2, imgs.length - 1));
  if (vIndex > 0 && vIndex % 2 === 0) vIndex -= 1;
  renderViewer();
}
$('vprev').onclick = () => step(-1);
$('vnext').onclick = () => step(+1);
$('vfs').onclick = () => { const v=$('viewer'); if (document.fullscreenElement) document.exitFullscreen(); else (v.requestFullscreen||v.webkitRequestFullscreen).call(v); };
document.addEventListener('keydown', e => { if (e.key==='ArrowLeft') step(+1); if (e.key==='ArrowRight') step(-1); });

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fail(msg){ showOverlay(msg, true); throw new Error(msg); }
</script>
</body>
</html>
