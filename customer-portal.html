<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>הפורטל שלי — סולן הדפסות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root { --press:#2d3561; --press-d:#222a4d; --gold:#c9a84c; --gold-light:#e8d5a3; --line:#e5e7eb; --ink:#1f2937; --green:#16a34a; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Heebo',system-ui,"Segoe UI",Arial,sans-serif; color:var(--ink);
         background:linear-gradient(180deg,#eef1f6 0%,#f5f6f9 100%); min-height:100vh; }
  .brandbar { background:linear-gradient(135deg,var(--press) 0%,var(--press-d) 100%); color:#fff;
    padding:15px 18px; box-shadow:0 4px 18px rgba(45,53,97,.28); display:flex; align-items:center; gap:13px; position:relative; }
  .brandbar::after { content:''; position:absolute; left:0; right:0; bottom:0; height:3px;
    background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold)); }
  .brandbar .logo { width:44px; height:44px; border-radius:12px; background:rgba(255,255,255,.1);
    border:1.5px solid rgba(201,168,76,.6); display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
  .brandbar h1 { font-size:1.15rem; font-weight:900; margin:0; } .brandbar h1 span { color:var(--gold); }
  .brandbar .who { font-size:.82rem; color:var(--gold-light); margin-top:1px; }
  .wrap { max-width:820px; margin:0 auto; padding:16px 14px 60px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:14px; box-shadow:0 2px 10px rgba(0,0,0,.05); }
  .card h2 { font-size:1.02rem; color:var(--press); margin:0 0 10px; display:flex; align-items:center; gap:8px; }
  .notice { background:#fffbeb; border:1.5px solid #fde68a; border-radius:12px; padding:13px 15px; margin-bottom:14px; }
  .notice h2 { color:#92400e; }
  .notice ul { margin:6px 0 0; padding-inline-start:20px; } .notice li { margin:5px 0; font-weight:600; color:#78350f; line-height:1.5; }
  .row { display:flex; gap:10px; align-items:center; padding:11px 4px; border-bottom:1px solid #f0f0f0; flex-wrap:wrap; }
  .row:last-child { border-bottom:none; }
  .row .main { flex:1; min-width:150px; }
  .row .title { font-weight:800; color:#111; }
  .row .meta { font-size:.78rem; color:#6b7280; margin-top:2px; }
  .badge { font-size:.72rem; font-weight:800; padding:3px 9px; border-radius:999px; white-space:nowrap; }
  .b-approved { background:#dcfce7; color:#166534; } .b-wait { background:#fef9c3; color:#854d0e; } .b-new { background:#e0e7ff; color:#3730a3; }
  .btn { border:none; border-radius:9px; padding:9px 14px; font-weight:800; cursor:pointer; font-family:inherit; font-size:.85rem; text-decoration:none; display:inline-flex; align-items:center; gap:5px; }
  .btn-v { background:#eef2ff; color:var(--press); } .btn-dl { background:#f3f4f6; color:#374151; }
  .btn-approve { background:linear-gradient(135deg,var(--green),#15803d); color:#fff; }
  .btn-primary { background:var(--press); color:#fff; }
  .empty { color:#9ca3af; text-align:center; padding:18px 0; }
  #gate { max-width:460px; margin:12vh auto; text-align:center; padding:26px; }
  #gate .big { font-size:2.4rem; margin-bottom:8px; }
  #up-drop { border:2px dashed #c7d2fe; border-radius:12px; padding:20px; text-align:center; color:#4b5563; cursor:pointer; background:#f8faff; }
  #up-drop.over { background:#eef2ff; border-color:var(--press); }
  #up-list { margin-top:8px; font-size:.82rem; color:#374151; }
  #ov { position:fixed; inset:0; background:rgba(255,255,255,.94); display:none; align-items:center; justify-content:center; flex-direction:column; gap:12px; z-index:80; text-align:center; padding:24px; }
  #ovBar { width:260px; max-width:78vw; height:12px; background:var(--line); border-radius:7px; overflow:hidden; display:none; }
  #ovBar>div { height:100%; width:0; background:linear-gradient(90deg,#2d3561,#16a34a); transition:width .15s; }
  .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#111827; color:#fff; padding:11px 18px; border-radius:10px; font-weight:700; z-index:90; box-shadow:0 6px 20px rgba(0,0,0,.3); }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="ov"><div id="ovText">טוען…</div><div id="ovBar"><div></div></div></div>

<div id="gate" class="hidden">
  <div class="big">🔒</div>
  <h2 id="gate-msg">הקישור אינו תקין.</h2>
  <div style="color:#6b7280;font-size:.9rem;margin-top:8px">אנא פנו לבית הדפוס לקבלת קישור מעודכן.</div>
</div>

<div id="app" class="hidden">
  <div class="brandbar">
    <div class="logo">📰</div>
    <div>
      <h1>סולן הדפסות <span>בע"מ</span></h1>
      <div class="who" id="who">הפורטל שלי</div>
    </div>
  </div>
  <div class="wrap">
    <div id="notices" class="notice hidden">
      <h2>🔔 דרישות מבית הדפוס</h2>
      <ul id="notices-list"></ul>
    </div>

    <div class="card">
      <h2>📤 העלאת קבצים לדפוס</h2>
      <div style="font-size:.84rem;color:#6b7280;margin-bottom:9px">גררו או בחרו קובצי PDF — הם יישלחו ישירות לבית הדפוס.</div>
      <div id="up-drop">📎 בחרו / גררו קבצים לכאן</div>
      <input type="file" id="up-input" accept="application/pdf" multiple hidden>
      <div id="up-list"></div>
    </div>

    <div class="card">
      <h2>🗂️ היסטוריית העיתונים שלי</h2>
      <div id="history"><div class="empty">טוען…</div></div>
    </div>
  </div>
</div>

<script>
const _FBURL   = 'https://solan-printing-default-rtdb.europe-west1.firebasedatabase.app';
const _BUCKETS = ['solan-printing.firebasestorage.app'];
const _FB_APIKEY = 'AIzaSyAFp99furP4L5hqTI-horBHmGZC9s13dGg';
// ── שומר-סביבה (דפי-כתיבה) — פתיחה מקומית לא כותבת ל-Firebase החי ──
(function(){
  if (window._solanEnvGuardReady) return; window._solanEnvGuardReady = true;
  window._solanEnvNow = function(){ try { if (typeof window._SOLAN_ENV_FORCE === 'string') return window._SOLAN_ENV_FORCE; var h=(location.hostname||'').toLowerCase(); return h==='solanprinting.github.io'?'production':'development'; } catch(e){ return 'development'; } };
  window._solanIsProd = function(){ return window._solanEnvNow()==='production'; };
  window._solanWritesAllowed = function(){ var e=window._solanEnvNow(); if(e==='production')return true; if(e==='development')return window._SOLAN_ALLOW_DEV_WRITES===true; return false; };
  window._solanIsFbWriteUrl = function(url, method){ url=String(url==null?'':url); method=String(method||'GET').toUpperCase(); if(method==='GET'||method==='HEAD'||method==='OPTIONS')return false; return url.indexOf('firebasedatabase.app')>=0||url.indexOf('firebasestorage.googleapis.com')>=0||url.indexOf('storage.googleapis.com')>=0; };
  window._fbWriteGuard = function(op){ if(window._solanWritesAllowed())return true; try{ console.warn('⛔ [SOLAN '+window._solanEnvNow().toUpperCase()+'] כתיבה ל-Firebase נחסמה (הגנת סביבה): '+op); }catch(e){} return false; };
  try { var _of=window.fetch; if(_of&&!_of._solanGuarded){ var wf=function(input,init){ try{ var url=(typeof input==='string')?input:(input&&input.url)||''; var method=(init&&init.method)||(typeof input!=='string'&&input&&input.method)||'GET'; if(window._solanIsFbWriteUrl(url,method)&&!window._fbWriteGuard(method+' '+url)) return Promise.resolve(new Response('{"error":"blocked-by-solan-env-guard"}',{status:503})); }catch(e){} return _of.apply(this,arguments); }; wf._solanGuarded=true; window.fetch=wf; } } catch(e){}
  try { var XP=window.XMLHttpRequest&&window.XMLHttpRequest.prototype; if(XP&&!XP._solanGuarded){ var _xopen=XP.open,_xsend=XP.send; XP.open=function(m,u){ this._solanMethod=m; this._solanUrl=u; return _xopen.apply(this,arguments); }; XP.send=function(){ try{ if(window._solanIsFbWriteUrl(this._solanUrl,this._solanMethod)&&!window._fbWriteGuard((this._solanMethod||'')+' '+this._solanUrl)){ var self=this; setTimeout(function(){ try{ self.dispatchEvent(new Event('error')); }catch(e){} },0); return; } }catch(e){} return _xsend.apply(this,arguments); }; XP._solanGuarded=true; } } catch(e){}
})();
// ── App Check ──
var _APPCHECK_SITEKEY = '6LeYDVMtAAAAAAsc-qvVPz9QvLhIlDBfcYCl-pXI';
window._appCheckReady = null;
window._appCheckInit = function(){
  if (!_APPCHECK_SITEKEY) return Promise.resolve(null);
  if (window._appCheckReady) return window._appCheckReady;
  window._appCheckReady = new Promise(function(resolve){
    function load(src){ return new Promise(function(res,rej){ var s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }
    var base='https://www.gstatic.com/firebasejs/10.12.5/';
    load(base+'firebase-app-compat.js').then(function(){ return load(base+'firebase-app-check-compat.js'); }).then(function(){
      try { if(!firebase.apps.length) firebase.initializeApp({ apiKey:_FB_APIKEY, authDomain:'solan-printing.firebaseapp.com', projectId:'solan-printing', databaseURL:_FBURL, appId:'1:1094826649317:web:bd5f5efdc1f8e3ab67160c' });
        var ac=firebase.appCheck(); ac.activate(new firebase.appCheck.ReCaptchaV3Provider(_APPCHECK_SITEKEY), true); resolve(ac); } catch(e){ resolve(null); }
    }).catch(function(){ resolve(null); });
  });
  return window._appCheckReady;
};
window._appCheckToken = function(){
  if (!_APPCHECK_SITEKEY) return Promise.resolve(null);
  return window._appCheckInit().then(function(ac){ if(!ac)return null; return Promise.race([ ac.getToken(false).then(function(r){ return (r&&r.token)||null; }).catch(function(){ return null; }), new Promise(function(res){ setTimeout(function(){ res(null); },8000); }) ]); }).catch(function(){ return null; });
};
(function(){ var _of=window.fetch; window.fetch=function(input,init){ try{ var url=(typeof input==='string')?input:(input&&input.url)||''; if(_APPCHECK_SITEKEY&&url.indexOf('firebasedatabase.app')>=0){ return window._appCheckToken().then(function(ac){ init=init||{}; if(ac){ var h=new Headers(init.headers||(typeof input!=='string'&&input.headers)||{}); h.set('X-Firebase-AppCheck',ac); init.headers=h; } return _of.call(window,input,init); }); } }catch(e){} return _of.call(window,input,init); }; })();
try { window._appCheckToken(); } catch(e){}
let _fbTok=null,_fbTokExp=0,_fbTokP=null;
async function _fbAuthToken(){
  if (_fbTok && Date.now() < _fbTokExp-120000) return _fbTok;
  if (_fbTokP) return _fbTokP;
  _fbTokP = (async function(){
    try {
      let j=null, rt=null; try{ rt=localStorage.getItem('solanFbAnonRT'); }catch(e){}
      if (rt) { const r=await fetch('https://securetoken.googleapis.com/v1/token?key='+_FB_APIKEY,{ method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:'grant_type=refresh_token&refresh_token='+encodeURIComponent(rt) }); if(r.ok){ const d=await r.json(); j={ token:d.id_token, rt:d.refresh_token, exp:Date.now()+(parseInt(d.expires_in)||3600)*1000 }; } }
      if (!j) { const r=await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key='+_FB_APIKEY,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({returnSecureToken:true}) }); if(r.ok){ const d=await r.json(); j={ token:d.idToken, rt:d.refreshToken, exp:Date.now()+(parseInt(d.expiresIn)||3600)*1000 }; } }
      if (j) { _fbTok=j.token; _fbTokExp=j.exp; try{ localStorage.setItem('solanFbAnonRT', j.rt); }catch(e){} _fbTokP=null; return _fbTok; }
    } catch(e){}
    _fbTokP=null; return null;
  })();
  return _fbTokP;
}
async function _au(url){ const t=await _fbAuthToken(); return t ? url+(url.indexOf('?')>=0?'&':'?')+'auth='+t : url; }
_fbAuthToken();

const $ = id => document.getElementById(id);
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function showOv(t,on,pct){ $('ovText').textContent=t; $('ov').style.display=on?'flex':'none'; if(pct==null){ $('ovBar').style.display='none'; } else { $('ovBar').style.display='block'; $('ovBar').firstElementChild.style.width=Math.round(pct)+'%'; } }
function toast(m){ var t=document.createElement('div'); t.className='toast'; t.textContent=m; document.body.appendChild(t); setTimeout(function(){ t.remove(); }, 3200); }

// ── עוזרים טהורים (נבדקים) ──
function _slug(s){ return String(s||'').trim().toLowerCase().replace(/[.#$\[\]\/\\]+/g,'').replace(/\s+/g,'_'); }
function _portalFilterProofs(all, slug){                      // כל העבודות של הלקוח לפי slug
  return Object.keys(all||{}).map(function(id){ var p=all[id]||{}; p._id=id; return p; })
    .filter(function(p){ return p && !p._deleted && _slug(p.customer) === slug; })
    .sort(function(a,b){ return (b.createdAt||b.approvedAt||0) - (a.createdAt||a.approvedAt||0); });
}
function _portalOpenNotices(obj){                              // דרישות פתוחות (לא בוצעו), חדשות קודם
  return Object.keys(obj||{}).map(function(id){ var n=obj[id]||{}; n._id=id; return n; })
    .filter(function(n){ return n && n.text && !n.done; })
    .sort(function(a,b){ return (b.at||0)-(a.at||0); });
}
function _proofBadge(p){                                       // סטטוס תצוגה לעבודה
  if (p.apogeeUrl && !p.apogeeApprovedAt) return { cls:'b-wait', txt:'ממתין לאישורך' };
  if (p.status === 'approved' || p.apogeeApprovedAt) return { cls:'b-approved', txt:'אושר' };
  if (p.source === 'portal') return { cls:'b-new', txt:'נשלח לבית הדפוס' };
  return { cls:'b-wait', txt:'בטיפול' };
}

const params = new URLSearchParams(location.search);
const CUST = params.get('cust') || '';
const KEY  = params.get('k') || '';
const SLUG = _slug(CUST);
let _portalRec = null;

(async function init(){
  showOv('טוען את הפורטל…', true);
  if (!CUST || !SLUG){ return gate('הקישור חסר פרטי לקוח.'); }
  try { _portalRec = await (await fetch(await _au(`${_FBURL}/customerPortals/${SLUG}.json`))).json(); }
  catch(e){ return gate('שגיאה בטעינה. נסו שוב מאוחר יותר.'); }
  if (!_portalRec){ return gate('הפורטל עדיין לא הופעל עבורכם.'); }
  if (!_portalRec.token || _portalRec.token !== KEY){ return gate('הקישור אינו תקין או פג תוקף.'); }
  $('who').textContent = 'שלום, ' + (_portalRec.name || CUST);
  $('gate').classList.add('hidden'); $('app').classList.remove('hidden');
  showOv('', false);
  wireUpload();
  await Promise.all([ loadNotices(), loadHistory() ]);
})();

function gate(msg){ showOv('', false); $('app').classList.add('hidden'); $('gate-msg').textContent = msg; $('gate').classList.remove('hidden'); }

async function loadNotices(){
  let obj = null;
  try { obj = await (await fetch(await _au(`${_FBURL}/customerNotices/${SLUG}.json`))).json(); } catch(e){}
  const open = _portalOpenNotices(obj);
  if (!open.length){ $('notices').classList.add('hidden'); return; }
  $('notices-list').innerHTML = open.map(function(n){
    var icon = n.type==='approve' ? '📖' : (n.type==='replace' ? '🔁' : '📌');
    return '<li>'+icon+' '+esc(n.text)+'</li>';
  }).join('');
  $('notices').classList.remove('hidden');
}

async function loadHistory(){
  let all = null;
  try { all = await (await fetch(await _au(`${_FBURL}/customerProofs.json`))).json(); } catch(e){}
  const list = _portalFilterProofs(all, SLUG);
  if (!list.length){ $('history').innerHTML = '<div class="empty">אין עדיין עיתונים 🗞️</div>'; return; }
  $('history').innerHTML = list.map(function(p){
    var b = _proofBadge(p);
    var date = p.createdAt ? new Date(p.createdAt).toLocaleDateString('he-IL') : (p.approvedAt ? new Date(p.approvedAt).toLocaleDateString('he-IL') : '');
    var acts = '';
    // פרופר-אפוגי לדפדוף + אישור
    if (p.apogeeUrl){
      var fold = p.apogeeFold || '32';
      var link = 'imposition-tool.html?proofUrl='+encodeURIComponent(p.apogeeUrl)+'&type='+encodeURIComponent(fold)+'&auto=1&client=1';
      acts += '<a class="btn btn-v" target="_blank" rel="noopener" href="'+link+'">📖 דפדף פרופר</a>';
      acts += '<a class="btn btn-dl" href="'+esc(p.apogeeUrl)+'" download>⬇ הורד</a>';
      if (!p.apogeeApprovedAt) acts += '<button class="btn btn-approve" onclick="approveApogee(\''+p._id+'\')">✓ אשר לדפוס</button>';
    } else if (p.fileUrl){
      acts += '<a class="btn btn-v" target="_blank" rel="noopener" href="proof-viewer.html?id='+encodeURIComponent(p._id)+'">👁 צפה</a>';
      acts += '<a class="btn btn-dl" href="'+esc(p.fileUrl)+'" download>⬇ הורד</a>';
    }
    return '<div class="row"><div class="main"><div class="title">'+esc(p.title || (p.customer? p.customer+' — עיתון' : 'עיתון'))+'</div>'
      + '<div class="meta">'+(date?date+' · ':'')+(p.pageCount?p.pageCount+' עמ\' · ':'')+(p.apogeeApprovedAt?'אושר '+new Date(p.apogeeApprovedAt).toLocaleDateString('he-IL'):'')+'</div></div>'
      + '<span class="badge '+b.cls+'">'+b.txt+'</span>'
      + '<div style="display:flex;gap:6px;flex-wrap:wrap">'+acts+'</div></div>';
  }).join('');
}

// ── אישור פרופר-אפוגי ──
async function approveApogee(id){
  var name = prompt('לאישור הפרופר לדפוס — שם מלא של המאשר:', (_portalRec && _portalRec.name) || CUST);
  if (name == null) return;
  name = String(name).trim(); if (!name){ toast('נא להזין שם'); return; }
  if (!confirm('לאשר את הפרופר לדפוס? לאחר האישור הוא נשלח להדפסה.')) return;
  showOv('שולח אישור…', true);
  try {
    var now = Date.now();
    await fetch(await _au(`${_FBURL}/customerProofs/${id}.json`), { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ apogeeApprovedAt: now, apogeeApprovedBy: name }) });
    // רשומת-אישור קבועה (בית הדפוס מנטר את bookletApprovals ומקבל התראה)
    await fetch(await _au(`${_FBURL}/bookletApprovals/portal_${id}.json`), { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name:name, at:now, fileName:(CUST+' — פרופר'), foldType:'', ua:navigator.userAgent, source:'portal' }) });
    showOv('', false); toast('✓ הפרופר אושר — תודה!');
    await loadHistory();
  } catch(e){ showOv('', false); toast('⚠️ האישור נכשל — נסו שוב'); }
}

// ── העלאת קבצים חדשים לדפוס ──
function wireUpload(){
  var drop = $('up-drop'), inp = $('up-input');
  drop.onclick = function(){ inp.click(); };
  ['dragover','dragenter'].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.add('over'); }); });
  ['dragleave','drop'].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.remove('over'); }); });
  drop.addEventListener('drop', function(e){ if (e.dataTransfer.files && e.dataTransfer.files.length) handleUpload(e.dataTransfer.files); });
  inp.onchange = function(e){ if (e.target.files && e.target.files.length) handleUpload(e.target.files); };
}
async function handleUpload(fileList){
  var files = Array.prototype.slice.call(fileList).filter(function(f){ return f.type==='application/pdf' || /\.pdf$/i.test(f.name||''); });
  if (!files.length){ toast('נא לבחור קובצי PDF'); return; }
  for (var i=0;i<files.length;i++){
    var f = files[i];
    showOv('מעלה '+(i+1)+'/'+files.length+' — '+f.name+'…', true, 0);
    try {
      var buf = new Uint8Array(await f.arrayBuffer());
      var jobId = 'portal_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
      var safe = (f.name||'file.pdf').replace(/[\\/:*?"<>|#%&{}]+/g,'_').slice(0,90);
      var path = 'customerProofs/'+SLUG+'/'+jobId+'/'+safe;
      var url = await uploadBytes(path, buf, function(pct){ showOv('מעלה '+(i+1)+'/'+files.length+'…', true, pct); });
      await fetch(await _au(`${_FBURL}/customerProofs/${jobId}.json`), { method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ customer:(_portalRec&&_portalRec.name)||CUST, title:'העלאת לקוח — '+(f.name||'קובץ'), status:'awaiting-shop', source:'portal', fileUrl:url, filePath:path, fileName:safe, fileSize:buf.byteLength, createdAt:Date.now() }) });
    } catch(e){ console.error(e); showOv('', false); toast('⚠️ העלאת '+(f.name||'')+' נכשלה'); return; }
  }
  showOv('', false); toast('✓ הקבצים נשלחו לבית הדפוס'); $('up-list').textContent = '';
  await loadHistory();
}
async function uploadBytes(path, bytes, onProgress){
  var lastErr;
  for (var bi=0; bi<_BUCKETS.length; bi++){
    for (var attempt=1; attempt<=3; attempt++){
      try {
        var json = await xhrPost('https://firebasestorage.googleapis.com/v0/b/'+_BUCKETS[bi]+'/o?name='+encodeURIComponent(path), bytes, onProgress);
        var token = (json.downloadTokens||'').split(',')[0] || '';
        return 'https://firebasestorage.googleapis.com/v0/b/'+_BUCKETS[bi]+'/o/'+encodeURIComponent(path)+'?alt=media&token='+token;
      } catch(e){ lastErr=e; if(e.code===403) throw e; await new Promise(function(r){ setTimeout(r, 1500*attempt); }); }
    }
  }
  throw lastErr || new Error('העלאה נכשלה');
}
function xhrPost(url, bytes, onProgress){
  return new Promise(function(resolve, reject){
    var xhr = new XMLHttpRequest(); xhr.open('POST', url); xhr.timeout = 0;
    xhr.setRequestHeader('Content-Type','application/pdf');
    xhr.upload.onprogress = function(e){ if(e.lengthComputable && onProgress) onProgress(Math.round(e.loaded/e.total*100)); };
    var finishSend = function(t){ try{ if(t) xhr.setRequestHeader('Authorization','Firebase '+t); }catch(e){} (window._appCheckToken?window._appCheckToken():Promise.resolve(null)).then(function(act){ try{ if(act) xhr.setRequestHeader('X-Firebase-AppCheck',act); }catch(e){} xhr.send(bytes); }, function(){ xhr.send(bytes); }); };
    xhr.onload = function(){ if(xhr.status>=200&&xhr.status<300){ try{ resolve(JSON.parse(xhr.responseText)); }catch(e){ var er=new Error('bad'); er.code=xhr.status; reject(er); } return; } var er=new Error('Storage '+xhr.status); er.code=xhr.status; reject(er); };
    xhr.onerror = function(){ var e=new Error('שגיאת רשת'); e.code=0; reject(e); };
    xhr.ontimeout = function(){ var e=new Error('פג זמן'); e.code=408; reject(e); };
    _fbAuthToken().then(finishSend, function(){ finishSend(null); });
  });
}
