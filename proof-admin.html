<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>לקוחות עיתונים — ניהול | סולן הדפסות</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root { --press:#2d3561; --press-d:#222a4d; --gold:#c9a84c; --gold-light:#e8d5a3; --green:#16a34a; --red:#dc2626; --amber:#d97706; --line:#e5e7eb; --ink:#1f2937; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Heebo',system-ui,"Segoe UI",Arial,sans-serif; color:var(--ink);
         background:linear-gradient(180deg,#eef1f6 0%,#f5f6f9 100%); min-height:100vh; padding:0 0 28px; }
  .wrap { max-width: 1040px; margin: 0 auto; padding:0 18px; }
  .brandbar { background:linear-gradient(135deg,var(--press) 0%,var(--press-d) 100%); color:#fff; padding:15px 20px;
    box-shadow:0 4px 18px rgba(45,53,97,.28); display:flex; align-items:center; gap:13px; position:relative; margin-bottom:18px; }
  .brandbar::after { content:''; position:absolute; left:0; right:0; bottom:0; height:3px;
    background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold)); }
  .brandbar .logo { width:42px; height:42px; border-radius:11px; background:rgba(255,255,255,.1);
    border:1.5px solid rgba(201,168,76,.6); display:flex; align-items:center; justify-content:center; font-size:1.35rem; flex-shrink:0; }
  .brandbar h1 { font-size:1.3rem; font-weight:900; margin:0; } .brandbar h1 span { color:var(--gold); }
  .brandbar .tag { font-size:.8rem; color:var(--gold-light); margin-top:1px; }
  .top { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:10px; flex-wrap:wrap; }
  .top h2 { font-size:1.05rem; font-weight:800; margin:0; color:var(--press); }
  .btn { padding:10px 17px; border:none; border-radius:10px; background:var(--press); color:#fff; font-weight:700; cursor:pointer; font-size:.9rem; font-family:inherit; transition:all .15s; }
  .btn:hover { background:var(--press-d); }
  .btn.ghost { background:#fff; color:var(--press); border:1.5px solid var(--line); }
  .btn.ghost:hover { border-color:var(--gold); background:#fffdf6; }
  .btn:disabled { opacity:.4; cursor:default; }
  table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(45,53,97,.07); }
  th,td { padding:11px 13px; text-align:right; border-bottom:1px solid var(--line); font-size:.88rem; vertical-align:middle; }
  th { background:#eef0f6; font-size:.8rem; font-weight:700; color:var(--press); }
  tr:last-child td { border-bottom:none; }
  .badge { display:inline-block; padding:3px 11px; border-radius:20px; font-size:.76rem; font-weight:700; }
  .b-pending  { background:#fef3c7; color:var(--amber); }
  .b-approved { background:#dcfce7; color:var(--green); }
  .b-rejected { background:#fee2e2; color:var(--red); }
  .acts { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .acts a, .acts button, .acts select { font-size:.8rem; padding:6px 11px; border-radius:8px; border:1.5px solid var(--line); background:#fff; cursor:pointer; text-decoration:none; color:var(--ink); font-family:inherit; transition:all .12s; }
  .acts a:hover, .acts button:hover { border-color:var(--gold); background:#fffdf6; }
  .acts .gen { background:var(--green); color:#fff; border-color:var(--green); font-weight:700; }
  .acts .gen:hover { background:#15803d; border-color:#15803d; }
  .acts .del { background:#fff; color:var(--red); border-color:#fecaca; }
  .acts .dl { background:#f4f1e6; color:#6b5618; border-color:var(--gold-light); font-weight:700; }
  .note { font-size:.78rem; color:var(--red); margin-top:3px; }
  #msg { margin:12px 0; font-size:.85rem; color:#374151; min-height:1.2em; }
  .empty { text-align:center; padding:46px; color:#9ca3af; background:#fff; border-radius:12px; box-shadow:0 4px 20px rgba(45,53,97,.07); }
  .folder { background:#fff; border-radius:12px; box-shadow:0 4px 20px rgba(45,53,97,.07); margin-bottom:14px; overflow:hidden; border:1px solid var(--line); }
  .folder > summary { cursor:pointer; padding:13px 16px; font-weight:800; font-size:.95rem; color:var(--press);
    background:#eef0f6; list-style:none; user-select:none; border-right:4px solid var(--gold); }
  .folder > summary::-webkit-details-marker { display:none; }
  .folder > summary .count { color:#6b7280; font-weight:600; font-size:.82rem; }
  .folder table { box-shadow:none; border-radius:0; }
</style>
</head>
<body>
<div class="brandbar">
  <div class="logo">🖨️</div>
  <div>
    <h1>סולן הדפסות <span>בע"מ</span></h1>
    <div class="tag">לוח ניהול — לקוחות עיתונים ואישורי קבצים</div>
  </div>
</div>
<div class="wrap">
  <div class="top">
    <h2>📋 עבודות לקוחות</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ghost" id="invite">+ לקוח / עבודה חדשה</button>
      <button class="btn ghost" id="usageBtn">💾 ניצול אחסון</button>
      <button class="btn" id="refresh">↻ רענן</button>
    </div>
  </div>
  <div id="usage"></div>
  <div id="msg"></div>
  <div id="tableWrap"></div>
</div>

<script>
const _FBURL = 'https://solan-printing-default-rtdb.europe-west1.firebasedatabase.app';
const $ = id => document.getElementById(id);
const msg = m => $('msg').textContent = m;

const STATUS = {
  awaiting_upload:  ['ממתין להעלאת הלקוח', 'b-pending'],
  pending_approval: ['ממתין לאישור', 'b-pending'],
  approved:         ['מאושר', 'b-approved'],
  rejected:         ['נדחה — תיקון', 'b-rejected'],
};

let _allRows = [];

async function loadProofs() {
  msg('טוען…');
  const data = await (await fetch(`${_FBURL}/customerProofs.json`)).json() || {};
  _allRows = Object.entries(data)
    .map(([id, p]) => ({ id, ...p }))
    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  render(_allRows);
  msg(_allRows.length ? `${_allRows.length} קבצים` : '');
}

function render(rows) {
  if (!rows.length) { $('tableWrap').innerHTML = '<div class="empty">אין קבצים עדיין. לחץ "קובץ חדש".</div>'; return; }
  const base = location.href.replace(/[^/]+(\?.*)?$/, '');
  const fmt = t => t ? new Date(t).toLocaleString('he-IL', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' }) : '—';

  // קיבוץ לפי לקוח — תיקייה לכל לקוח
  const byCustomer = new Map();
  for (const p of rows) {
    const key = (p.customer || 'ללא לקוח').trim();
    if (!byCustomer.has(key)) byCustomer.set(key, []);
    byCustomer.get(key).push(p);
  }

  // רישום יעדים לייצור ריצות (כדי לתמוך גם בריצות בודדות שאינן ב-_allRows)
  _genReg = {}; let gi = 0;
  const genCell = (fileUrl, title) => {
    const key = 'g' + (gi++); _genReg[key] = { fileUrl, title };
    return `<button class="dl" data-dl="${key}">⬇ הורד עיתון</button>
            <select data-sheet="${key}"><option value="32">70×100</option><option value="16">64×90</option></select>
            <button class="gen" data-gen="${key}">⬇ ייצר ריצות</button>`;
  };

  const rowHtml = p => {
    const clientLink = `${base}proof-client.html?id=${p.id}`;
    const viewerLink = `${base}proof-viewer.html?id=${p.id}`;  // צפייה בלבד — לשליחה לעובדים
    const parts = p.parts ? Object.entries(p.parts).map(([pid, pt]) => ({ pid, ...pt }))
                                 .sort((a,b)=>(a.approvedAt||0)-(b.approvedAt||0)) : [];

    // ── עבודה לפי ריצות ──
    if (parts.length) {
      const head = `<tr>
        <td><b>${escapeHtml(p.title || '—')}</b></td>
        <td><span class="badge b-approved">${parts.length} ריצות התקבלו</span></td>
        <td>נוצר: ${fmt(p.createdAt)}</td>
        <td><div class="acts">
          <a href="${viewerLink}" target="_blank">👁 צפה בדפדוף</a>
          <button data-link="${clientLink}">📤 קישור ללקוח</button>
          <button data-link="${viewerLink}">📤 שלח לעובדים</button>
          <button class="del" data-deljob="${p.id}" title="מחק עבודה וכל הריצות">🗑</button>
        </div></td></tr>`;
      const partRows = parts.map(pt => `<tr>
        <td style="padding-right:26px;color:#555">↳ ${escapeHtml(pt.name)} <span style="color:#9ca3af">(${pt.pageCount} עמ')</span></td>
        <td><span class="badge b-approved">מאושר</span></td>
        <td>אושר: ${fmt(pt.approvedAt)}</td>
        <td><div class="acts">
          <a href="${base}proof-viewer.html?id=${p.id}&part=${pt.pid}" target="_blank">👁 צפה</a>
          <button data-link="${base}proof-viewer.html?id=${p.id}&part=${pt.pid}">📤 לעובדים</button>
          ${genCell(pt.fileUrl, (p.title ? p.title + ' — ' : '') + pt.name)}
          <button class="del" data-delpart="${p.id}|${pt.pid}|${encodeURIComponent(pt.filePath||'')}" title="מחק ריצה">🗑</button>
        </div></td></tr>`).join('');
      return head + partRows;
    }

    // ── עבודה רגילה (עיתון מלא / ממתין) ──
    const [txt, cls] = STATUS[p.status] || ['—', ''];
    const gen = p.status === 'approved' ? genCell(p.fileUrl, p.title || p.customer || 'עיתון')
      : `<button disabled title="זמין רק לאחר אישור">⬇ ייצר ריצות</button>`;
    const view = p.fileUrl ? `<a href="${viewerLink}" target="_blank">👁 צפה בדפדוף</a>` : '';
    const toWorkers = p.fileUrl ? `<button data-link="${viewerLink}">📤 שלח לעובדים</button>` : '';
    const note = (p.status === 'rejected' && p.customerNote) ? `<div class="note">📝 ${escapeHtml(p.customerNote)}</div>` : '';
    const approvedLine = p.approvedAt ? `<div class="note" style="color:#16a34a">✓ אושר: ${fmt(p.approvedAt)}</div>` : '';
    return `<tr>
      <td>${escapeHtml(p.title || (p.customer ? p.customer + ' — עיתון' : 'עיתון'))}${note}</td>
      <td><span class="badge ${cls}">${txt}</span></td>
      <td>נוצר: ${fmt(p.createdAt)}${approvedLine}</td>
      <td><div class="acts">
        <a href="${clientLink}" target="_blank">🔗 פתח</a>
        <button data-link="${clientLink}">📤 קישור ללקוח</button>
        ${view}${toWorkers}${gen}
        <button class="del" data-deljob="${p.id}" title="מחק עבודה">🗑</button>
      </div></td></tr>`;
  };

  const folders = [...byCustomer.entries()].map(([customer, items]) => `
    <details class="folder" open>
      <summary>📁 ${escapeHtml(customer)} <span class="count">(${items.length})</span></summary>
      <table><thead><tr><th>שם העבודה / ריצה</th><th>סטטוס</th><th>תאריך</th><th>פעולות</th></tr></thead>
      <tbody>${items.map(rowHtml).join('')}</tbody></table>
    </details>`).join('');

  $('tableWrap').innerHTML = folders;

  document.querySelectorAll('[data-link]').forEach(b => b.onclick = () => shareLink(b.dataset.link));
  document.querySelectorAll('[data-gen]').forEach(b => b.onclick = () => {
    const t = _genReg[b.dataset.gen];
    const sheet = parseInt(document.querySelector(`[data-sheet="${b.dataset.gen}"]`).value, 10);
    generateRuns(t, sheet, b);
  });
  document.querySelectorAll('[data-deljob]').forEach(b => b.onclick = () =>
    deleteProof(_allRows.find(r => r.id === b.dataset.deljob)));
  document.querySelectorAll('[data-delpart]').forEach(b => b.onclick = () => {
    const [jobId, pid, fp] = b.dataset.delpart.split('|');
    deletePart(jobId, pid, decodeURIComponent(fp));
  });
  document.querySelectorAll('[data-dl]').forEach(b => b.onclick = () => {
    const t = _genReg[b.dataset.dl];
    downloadFile(t.fileUrl, (t.title || 'עיתון').replace(/[\\/:*?"<>|]/g,'_') + '.pdf', b);
  });
}
let _genReg = {};

// הורדת הקובץ למחשב (לשליחה ידנית בוואטסאפ וכו')
async function downloadFile(url, name, btn) {
  const old = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = 'מוריד…'; }
  try {
    const r = await fetch(url); const blob = await r.blob();
    downloadBlob(blob, name);
  } catch (e) { window.open(url, '_blank'); }
  if (btn) { btn.textContent = old; btn.disabled = false; }
}

// מחיקת ריצה בודדת
async function deletePart(jobId, pid, filePath) {
  if (!confirm('למחוק את הריצה הזו? הקובץ יימחק ולא ניתן לשחזר.')) return;
  msg('מוחק ריצה…');
  try {
    if (filePath) {
      for (const bucket of ['solan-printing.firebasestorage.app', 'solan-printing.appspot.com']) {
        try { const r = await fetch(`https://firebasestorage.googleapis.com/v0/b/${bucket}/o/${encodeURIComponent(filePath)}`, { method: 'DELETE' });
          if (r.ok || r.status === 404) break; } catch (e) {}
      }
    }
    await fetch(`${_FBURL}/customerProofs/${jobId}/parts/${pid}.json`, { method: 'DELETE' });
    await loadProofs();
  } catch (e) { console.error(e); msg('✗ שגיאה במחיקה: ' + e.message); }
}

// מחיקת קובץ: מוחק את הקובץ מ-Storage ואת הרשומה מ-RTDB.
async function deleteProof(p) {
  if (!p) return;
  if (!confirm(`למחוק לצמיתות את "${p.title || p.customer || 'עיתון'}"?\nכל הקבצים והרשומה יימחקו ולא ניתן לשחזר.`)) return;
  msg('מוחק…');
  try {
    // אסוף את כל הנתיבים: קובץ ראשי + כל הריצות
    const paths = [];
    if (p.filePath) paths.push(p.filePath);
    if (p.parts) Object.values(p.parts).forEach(pt => pt.filePath && paths.push(pt.filePath));
    for (const fp of paths) {
      for (const bucket of ['solan-printing.firebasestorage.app', 'solan-printing.appspot.com']) {
        try {
          const r = await fetch(`https://firebasestorage.googleapis.com/v0/b/${bucket}/o/${encodeURIComponent(fp)}`, { method: 'DELETE' });
          if (r.ok || r.status === 404) break;
        } catch (e) { /* נסה bucket הבא */ }
      }
    }
    await fetch(`${_FBURL}/customerProofs/${p.id}.json`, { method: 'DELETE' });
    await loadProofs();
  } catch (e) { console.error(e); msg('✗ שגיאה במחיקה: ' + e.message); }
}

// ── ייצור ריצות מהקובץ המאושר ──
function splitToKontresim(totalPages, fullSheet) {
  const layers = [];
  if (fullSheet === 32 && (totalPages === 20 || totalPages === 24)) layers.push(totalPages - 16, 16);
  else {
    const rem = totalPages % fullSheet;
    if (rem !== 0) layers.push(rem);
    let inner = totalPages - rem;
    while (inner > 0) { layers.push(fullSheet); inner -= fullSheet; }
  }
  let front = 1, back = totalPages;
  const range = (a, b) => Array.from({ length: b - a + 1 }, (_, k) => a + k);
  return layers.map((lp, i) => {
    const isLast = i === layers.length - 1, half = lp / 2;
    let pages, label;
    if (isLast && lp === fullSheet) { pages = range(front, front + lp - 1); label = `${front}-${front+lp-1}`; front += lp; }
    else {
      const fe = front + half - 1, bs = back - half + 1;
      if (fe + 1 === bs) { pages = range(front, back); label = `${front}-${back}`; }
      else { pages = [...range(front, fe), ...range(bs, back)]; label = `${front}-${fe}+${bs}-${back}`; }
      front += half; back -= half;
    }
    return { num: i + 1, pages, count: lp, label };
  });
}

// פיצול עמודי "כפולה" (עמוד PDF ברוחב כפול = שני עמודי עיתון מחוברים) לשני עמודים
// נפרדים: החצי הימני קודם (עברית — העמוד הנמוך מימין), אחריו החצי השמאלי.
// כך ספירת העמודים והחלוקה לריצות מתיישרות עם המספור האמיתי של העיתון.
async function normalizeSpreads(src) {
  const pages = src.getPages();
  if (pages.length < 2) return src;
  // גודל הבסיס = הגודל השכיח בקובץ (דליים של ~5 מ"מ)
  const bucket = v => Math.round(v / 14.17);
  const freq = {}; let bestK = null;
  pages.forEach(pg => {
    const mb = pg.getMediaBox();
    const k = bucket(mb.width) + 'x' + bucket(mb.height);
    freq[k] = (freq[k] || 0) + 1;
    if (bestK === null || freq[k] > freq[bestK]) bestK = k;
  });
  const baseIdx = pages.findIndex(pg => { const mb = pg.getMediaBox(); return bucket(mb.width) + 'x' + bucket(mb.height) === bestK; });
  const baseW = pages[baseIdx].getMediaBox().width, baseH = pages[baseIdx].getMediaBox().height;
  const isSpread = pg => { const mb = pg.getMediaBox(); return mb.width > baseW * 1.6 && Math.abs(mb.height - baseH) < baseH * 0.12; };
  if (!pages.some(isSpread)) return src;
  const out = await PDFLib.PDFDocument.create();
  for (let i = 0; i < pages.length; i++) {
    if (!isSpread(pages[i])) {
      const [pg] = await out.copyPages(src, [i]); out.addPage(pg);
      continue;
    }
    const mb = pages[i].getMediaBox();
    let tb; try { tb = pages[i].getTrimBox(); } catch (e) { tb = mb; }
    if (!tb || !tb.width) tb = mb;
    const halves = [
      { mx: mb.x + mb.width / 2, tx: tb.x + tb.width / 2 },   // ימין קודם (RTL)
      { mx: mb.x,                tx: tb.x }                    // שמאל
    ];
    for (const h of halves) {
      const [pg] = await out.copyPages(src, [i]);
      pg.setMediaBox(h.mx, mb.y, mb.width / 2, mb.height);
      pg.setCropBox(h.mx, mb.y, mb.width / 2, mb.height);
      try { pg.setTrimBox(h.tx, tb.y, tb.width / 2, tb.height); } catch (e) {}
      try { pg.setBleedBox(h.mx, mb.y, mb.width / 2, mb.height); } catch (e) {}
      out.addPage(pg);
    }
  }
  return out;
}

async function generateRuns(proof, fullSheet, btn) {
  const old = btn.textContent;
  btn.disabled = true; btn.textContent = 'מוריד קובץ…';
  try {
    const bytes = await (await fetch(proof.fileUrl)).arrayBuffer();
    btn.textContent = 'מפצל…';
    let src = await PDFLib.PDFDocument.load(bytes);
    src = await normalizeSpreads(src);   // כפולות → שני עמודים (ימין ואז שמאל)
    const total = src.getPageCount();
    const runs = splitToKontresim(total, fullSheet);

    const zip = new JSZip();
    const pad = n => String(n).padStart(2, '0');
    for (const run of runs) {
      const folder = zip.folder(`ריצה ${run.num} (עמ ${run.label})`);
      for (let i = 0; i < run.pages.length; i++) {
        const sp = run.pages[i];
        if (sp > total) continue;
        const out = await PDFLib.PDFDocument.create();
        const [pg] = await out.copyPages(src, [sp - 1]);
        out.addPage(pg);
        folder.file(`${pad(i + 1)}_pg${pad(sp)}.pdf`, await out.save());
      }
    }
    btn.textContent = 'בונה ZIP…';
    const blob = await zip.generateAsync({ type: 'blob' });
    downloadBlob(blob, `${(proof.title || 'חוברת')} — ריצות.zip`);
    btn.textContent = '✓ הורד';
    setTimeout(() => { btn.textContent = old; btn.disabled = false; }, 2500);
  } catch (e) {
    console.error(e); alert('שגיאה בייצור ריצות: ' + e.message);
    btn.textContent = old; btn.disabled = false;
  }
}

// ── עזרים ──
function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }
function downloadBlob(blob, name) {
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
}
// מציג את הקישור (תמיד ניתן להעתיק, גם בתוך iframe) וגם מנסה להעתיק אוטומטית.
async function shareLink(url) {
  try { await navigator.clipboard.writeText(url); } catch (e) {}
  prompt('קישור ללקוח — העתק (Ctrl+C) ושלח:', url);
}

async function copyText(text, btn) {
  let ok = false;
  try { await navigator.clipboard.writeText(text); ok = true; }
  catch (e) {
    try { const ta = document.createElement('textarea'); ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select(); ok = document.execCommand('copy'); ta.remove(); } catch (e2) {}
  }
  const t = btn.textContent; btn.textContent = ok ? '✓' : '⚠️';
  setTimeout(() => btn.textContent = t, 1200);
}

// יצירת הזמנה ללקוח — רשומה ריקה + קישור להעלאה
$('invite').onclick = async () => {
  const customer = prompt('שם הלקוח (עיתון):');
  if (!customer || !customer.trim()) return;
  const title = prompt('שם העבודה (אופציונלי):') || '';
  // גודל נדרש לעמוד (מ"מ) — הלקוח יקבל אזהרה אם יעלה בגודל אחר.
  // גדלי העיתונים הרגילים שלנו מוצעים כבחירה מהירה לפי מספר; אפשר גם להקליד גודל מותאם.
  const PRESETS = [
    { label: 'עיתון רגיל 16.5×24 ס"מ', w: 165, h: 240 },
    { label: '24×33 ס"מ',             w: 240, h: 330 },
    { label: 'A4 (21×29.7)',          w: 210, h: 297 },
    { label: 'A5 (14.8×21)',          w: 148, h: 210 },
    { label: 'A3 (29.7×42)',          w: 297, h: 420 },
    { label: 'טאבלויד 28×40 ס"מ',     w: 280, h: 400 },
  ];
  const menu = 'גודל עמוד נדרש — בחר/י מספר מהרשימה,\nאו הקלד/י גודל מותאם במ"מ (רוחב x גובה, למשל 330x500),\nאו השאר/י ריק לדילוג:\n\n'
    + PRESETS.map((p,i)=>`${i+1}. ${p.label}  (${p.w}×${p.h} מ"מ)`).join('\n');
  const sizeRaw = (prompt(menu, '1') || '').trim();
  let reqW = 0, reqH = 0;
  const pick = /^\d{1,2}$/.test(sizeRaw) ? PRESETS[+sizeRaw - 1] : null;
  if (pick) { reqW = pick.w; reqH = pick.h; }
  else {
    const m = sizeRaw.replace(',', '.').match(/(\d+(?:\.\d+)?)\s*[xX*×]\s*(\d+(?:\.\d+)?)/);
    if (m) { reqW = +m[1]; reqH = +m[2]; }
  }
  const id = crypto.randomUUID?.() || (Date.now().toString(36) + Math.random().toString(36).slice(2));
  msg('יוצר…');
  await fetch(`${_FBURL}/customerProofs/${id}.json`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: 'awaiting_upload', customer: customer.trim(), title: title.trim(), reqW, reqH, createdAt: Date.now() }),
  });
  const base = location.href.replace(/[^/]+(\?.*)?$/, '');
  const link = `${base}proof-client.html?id=${id}`;
  await loadProofs();
  prompt('הקישור ללקוח (העתק ושלח):', link);
};

// ── ניצול אחסון ──
const STORAGE_LIMIT_GB = 5;   // תקרה לתצוגה (שנה לפי התוכנית שלך)
$('usageBtn').onclick = async () => {
  const u = $('usage');
  u.innerHTML = '⏳ בודק ניצול אחסון…';
  // אסוף את כל הקבצים (עבודות + ריצות)
  const files = [];
  _allRows.forEach(p => {
    if (p.filePath) files.push({ path: p.filePath, size: p.fileSize });
    if (p.parts) Object.values(p.parts).forEach(pt => pt.filePath && files.push({ path: pt.filePath, size: pt.fileSize }));
  });
  let total = 0, unknown = 0;
  for (const f of files) {
    if (f.size) { total += +f.size; continue; }
    let got = false;
    for (const bucket of ['solan-printing.firebasestorage.app', 'solan-printing.appspot.com']) {
      try {
        const r = await fetch(`https://firebasestorage.googleapis.com/v0/b/${bucket}/o/${encodeURIComponent(f.path)}`);
        if (r.ok) { const j = await r.json(); total += parseInt(j.size || 0, 10); got = true; break; }
      } catch (e) {}
    }
    if (!got) unknown++;
  }
  const mb = total / 1048576, gb = total / 1073741824;
  const pct = Math.min(100, Math.round(gb / STORAGE_LIMIT_GB * 100));
  const color = pct >= 85 ? '#dc2626' : pct >= 60 ? '#d97706' : '#16a34a';
  u.innerHTML = `<div style="background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;margin:4px 0">
    <b>ניצול אחסון:</b> ${mb.toFixed(0)} MB (${gb.toFixed(2)} GB) ב-${files.length} קבצים${unknown?` <span style="color:#9ca3af">(${unknown} ללא גודל)</span>`:''}
    <div style="height:8px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:8px">
      <div style="height:100%;width:${pct}%;background:${color}"></div></div>
    <div style="font-size:.78rem;color:#6b7280;margin-top:5px">${pct}% מתוך תקרת ${STORAGE_LIMIT_GB}GB · מחקו קבצים ישנים (🗑) כדי לפנות מקום</div>
  </div>`;
};

$('refresh').onclick = loadProofs;
loadProofs();
</script>
