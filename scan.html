<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>סולן הדפסות — סריקת כרטיס</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body{font-family:'Heebo',Arial,sans-serif;background:#1a1a4e;color:#fff;margin:0;min-height:100vh;
       display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
  .box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);border-radius:16px;
       padding:26px 22px;max-width:420px;width:100%;text-align:center}
  h2{margin:0 0 6px;font-size:1.15rem}
  .sub{font-size:.85rem;color:rgba(255,255,255,.65);margin-bottom:18px}
  .spin{width:34px;height:34px;border:4px solid rgba(255,255,255,.25);border-top-color:#c9a84c;
        border-radius:50%;margin:14px auto;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .btn{display:block;width:100%;box-sizing:border-box;margin-top:10px;padding:13px;border:none;border-radius:10px;
       background:#c9a84c;color:#1a1a4e;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:900;cursor:pointer}
  .btn.alt{background:rgba(255,255,255,.14);color:#fff;font-weight:700}
  .err{color:#fca5a5;font-weight:700;margin-top:10px;line-height:1.6}
  .wait{font-size:.92rem;line-height:1.8;color:rgba(255,255,255,.85)}
</style>
</head>
<body>
<div class="box">
  <h2>🖨️ סולן הדפסות</h2>
  <div class="sub" id="sub">טוען את פרטי העבודה…</div>
  <div id="body"><div class="spin"></div></div>
</div>
<script>
// דף סריקת QR מכרטיס עבודה מודפס: ?c=<מזהה כרטיס> [&r=<ריצה>]
// מאתר את הפרופר העדכני של הכרטיס ופותח אותו כחוברת מקופלת בדפדוף (בכלי הקיפול),
// או ישירות (אם ידוע שהקובץ אינו גיליון פרוס). ההפניה לפי מזהה — תמיד הפרופר העדכני.
// אם עדיין אין קבצים: הדף ממתין ומתעדכן אוטומטית ברגע שמצורף פרופר (מעקב דרך
// _rev/cards הזעיר — כמעט אפס תעבורה בזמן ההמתנה).
var _FBURL = 'https://solan-printing-default-rtdb.europe-west1.firebasedatabase.app';
var _FB_APIKEY = 'AIzaSyAFp99furP4L5hqTI-horBHmGZC9s13dGg';
var TOKEN = null;

function _tok(){
  var rt = null; try { rt = localStorage.getItem('solanFbAnonRT'); } catch(e){}
  var step = rt
    ? fetch('https://securetoken.googleapis.com/v1/token?key=' + _FB_APIKEY, {
        method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:'grant_type=refresh_token&refresh_token=' + encodeURIComponent(rt)
      }).then(function(r){ return r.ok ? r.json() : Promise.reject(); })
        .then(function(j){ return { t:j.id_token, rt:j.refresh_token }; })
    : Promise.reject();
  return step.catch(function(){
    return fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=' + _FB_APIKEY, {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ returnSecureToken:true })
    }).then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(j){ return { t:j.idToken, rt:j.refreshToken }; });
  }).then(function(a){ try { localStorage.setItem('solanFbAnonRT', a.rt); } catch(e){} return a.t; })
    .catch(function(){ return null; });
}
function fetchCards(){
  return fetch(_FBURL + '/cards.json' + (TOKEN ? '?auth=' + TOKEN : '')).then(function(r){
    if (!r.ok) throw new Error('http ' + r.status);
    return r.json();
  });
}
function fetchCardsRev(){
  return fetch(_FBURL + '/_rev/cards.json' + (TOKEN ? '?auth=' + TOKEN : ''))
    .then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; });
}

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// זיהוי סוג הפריסה — אותם כללים כמו באפליקציה (תווית ← מס' עמודים ← מכונה)
function _lab(name){
  var s = String(name||'').toLowerCase();
  return {
    tumble:    s.indexOf('מתהפך')>=0 || s.indexOf('tumble')>=0 || s.indexOf('turn')>=0,
    perfector: s.indexOf('פרפקטור')>=0 || s.indexOf('perfector')>=0 || /\bperf\b/.test(s),
    ab:        /a\s*\+\s*b/.test(s) || s.indexOf('a+b')>=0 || /א\s*\+\s*ב/.test(s)
  };
}
function _machineOf(card, runKey){
  if (runKey && card.runs && card.runs.length){
    var n = parseInt(String(runKey).replace(/[^0-9]/g,''),10);
    var r = card.runs.find(function(x){ return x && ('R'+x.num)===String(runKey); }) || (!isNaN(n) ? card.runs[n-1] : null);
    if (r && r.machine) return r.machine;
  }
  return card.machine || '';
}
function _target(card, entry){
  var chk = entry.check || null;
  if (chk && chk.imposed === false) return entry.url;   // לא גיליון פרוס — פתח ישירות
  var lab = _lab(entry.name);
  var pages = chk && chk.pages;
  var sides2;
  if (lab.tumble) sides2 = false;
  else if (lab.perfector || lab.ab) sides2 = true;
  else if (pages === 1) sides2 = false;
  else if (pages >= 2) sides2 = true;
  else sides2 = (_machineOf(card, entry.key).indexOf('8') >= 0);
  var type = sides2 ? '32' : '16p';
  return 'imposition-tool.html?v=6&auto=1&type=' + type
    + '&proofUrl=' + encodeURIComponent(entry.url)
    + '&name=' + encodeURIComponent(entry.name || card.name || 'פרופר');
}

var qs = new URLSearchParams(location.search);
var cid = qs.get('c'), rk = qs.get('r');
var sub = document.getElementById('sub'), body = document.getElementById('body');

function findCard(v){
  var cards = Array.isArray(v) ? v : (v && typeof v === 'object' ? Object.values(v) : []);
  return cards.find(function(x){ return x && String(x.id) === String(cid); });
}
function collectProofs(card){
  var entries = [];
  if (card.runProofs) Object.keys(card.runProofs).sort().forEach(function(k){
    var rp = card.runProofs[k];
    if (rp && rp.url) entries.push({ key:k, name:rp.name||k, url:rp.url, check:rp.check||null });
  });
  if (card.proofUrl) entries.push({ key:null, name:card.proofName||'פרופר', url:card.proofUrl, check:card.proofCheck||null });
  if (rk) entries = entries.filter(function(e){ return String(e.key) === String(rk); });
  return entries;
}
function proceed(card, entries){
  if (entries.length === 1) {
    body.innerHTML = '<div class="spin"></div><div style="font-size:.85rem;color:rgba(255,255,255,.65)">פותח את החוברת…</div>';
    location.replace(_target(card, entries[0]));
    return;
  }
  body.innerHTML = '<div style="font-size:.9rem;margin-bottom:4px">לעבודה זו כמה פרופרים — בחר ריצה:</div>'
    + entries.map(function(e,i){
        return '<button class="btn' + (i>0?' alt':'') + '" data-i="' + i + '">📖 ' + esc(e.key||'פרופר') + ' — ' + esc(e.name) + '</button>';
      }).join('');
  body.querySelectorAll('button').forEach(function(b){
    b.onclick = function(){ location.href = _target(card, entries[parseInt(b.dataset.i,10)]); };
  });
}
// אין עדיין קבצים: המתן והתעדכן אוטומטית. עוקבים אחרי _rev/cards הזעיר (כמה בייטים)
// כל 15ש'; רק כשהוא משתנה מורידים את הכרטיסים מחדש. ברגע שמופיע פרופר — ממשיכים.
function waitForFiles(){
  body.innerHTML = '<div class="spin"></div>'
    + '<div class="wait">⏳ עדיין לא צורפו קבצים לעבודה זו.<br>'
    + 'ברגע שיצורף פרופר — החוברת תיפתח כאן אוטומטית.<br>'
    + '<span style="font-size:.75rem;color:rgba(255,255,255,.55)">אפשר להשאיר את המסך פתוח או לסרוק שוב מאוחר יותר.</span></div>'
    + '<button class="btn alt" id="chk-now">🔄 בדוק עכשיו</button>';
  var lastRev, ticks = 0, iv;
  function check(force){
    fetchCardsRev().then(function(rv){
      if (!force && lastRev !== undefined && rv === lastRev) return;   // אין שינוי — בלי הורדה
      lastRev = rv;
      fetchCards().then(function(v){
        var c = findCard(v); if (!c) return;
        var es = collectProofs(c);
        if (es.length) { if (iv) clearInterval(iv); proceed(c, es); }
      }).catch(function(){});
    });
  }
  iv = setInterval(function(){ if (++ticks > 120) { clearInterval(iv); return; } check(false); }, 15000);   // עד 30 דק'
  document.getElementById('chk-now').onclick = function(){ check(true); };
  check(false);   // קיבוע נקודת פתיחה
}

if (!cid) { sub.textContent = ''; body.innerHTML = '<div class="err">חסר מזהה כרטיס בקישור.</div>'; }
else _tok().then(function(t){ TOKEN = t; return fetchCards(); }).then(function(v){
  var card = findCard(v);
  if (!card) { sub.textContent = ''; body.innerHTML = '<div class="err">הכרטיס לא נמצא — ייתכן שהעבודה הושלמה ועברה לארכיון.</div>'; return; }
  sub.textContent = card.name || '';
  var entries = collectProofs(card);
  if (!entries.length) { waitForFiles(); return; }
  proceed(card, entries);
}).catch(function(e){
  sub.textContent = '';
  body.innerHTML = '<div class="err">שגיאה בטעינה — בדוק חיבור לאינטרנט ונסה שוב.</div>';
});
</script>
</body>
</html>
