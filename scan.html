<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>סולן הדפסות — סריקת כרטיס</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body{font-family:'Heebo',Arial,sans-serif;background:#1a1a4e;color:#fff;margin:0;min-height:100vh;
       display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
  .box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);border-radius:16px;
       padding:26px 22px;max-width:420px;width:100%;text-align:center}
  h2{margin:0 0 6px;font-size:1.15rem}
  .sub{font-size:.85rem;color:rgba(255,255,255,.65);margin-bottom:18px}
  .spin{width:34px;height:34px;border:4px solid rgba(255,255,255,.25);border-top-color:#c9a84c;
        border-radius:50%;margin:14px auto;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .btn{display:block;width:100%;box-sizing:border-box;margin-top:10px;padding:13px;border:none;border-radius:10px;
       background:#c9a84c;color:#1a1a4e;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:900;cursor:pointer}
  .btn.alt{background:rgba(255,255,255,.14);color:#fff;font-weight:700}
  .err{color:#fca5a5;font-weight:700;margin-top:10px;line-height:1.6}
  .wait{font-size:.92rem;line-height:1.8;color:rgba(255,255,255,.85)}
</style>
</head>
<body>
<div class="box">
  <h2>🖨️ סולן הדפסות</h2>
  <div class="sub" id="sub">טוען את פרטי העבודה…</div>
  <div id="body"><div class="spin"></div></div>
</div>
<script>
// דף סריקת QR מכרטיס עבודה מודפס: ?c=<מזהה כרטיס> [&r=<ריצה>]
// סדר עדיפויות:
//   1) חוברת אמיתית (עיתון/חוברת/8+ עמ') עם קובץ שהלקוח העלה במערכת האישורים →
//      דפדוף מקובץ הלקוח (proof-viewer) — סדר קריאה כפי שאושר.
//   2) חוברת בלי קובץ לקוח אך עם פרופר גיליון → קיפול הפרופר לחוברת (כלי הקיפול).
//   3) לא-חוברת (פוסטר/פלייסמנט/עלון שטוח) → פתיחת הקובץ ישירות — בלי קיפול בכלל.
//   4) אין קבצים עדיין → המתנה; הדף נפתח אוטומטית ברגע שמגיע קובץ (לקוח או פרופר).
var _FBURL = 'https://solan-printing-default-rtdb.europe-west1.firebasedatabase.app';
var _FB_APIKEY = 'AIzaSyAFp99furP4L5hqTI-horBHmGZC9s13dGg';
// ── שומר-סביבה (רשת ביטחון · ספרינט 1 שלב 5) — פתיחה מקומית לא כותבת ל-Firebase החי ──
//    production = הדומיין הרשמי בלבד; אחרת development (חסום ללא אישור); test = מאולץ.
//    עוטף fetch + XMLHttpRequest וחוסם כתיבות (PUT/POST/PATCH/DELETE) לכתובות RTDB/Storage
//    בכל סביבה שאינה production. בייצור — תמיד עובר (אפס שינוי התנהגות). זהה בכל הדפים.
(function(){
  if (window._solanEnvGuardReady) return;              // אידמפוטנטי — לא לעטוף פעמיים
  window._solanEnvGuardReady = true;
  window._solanEnv = (function(){
    try {
      if (typeof window._SOLAN_ENV_FORCE === 'string') return window._SOLAN_ENV_FORCE;
      var h = (typeof location !== 'undefined' && location.hostname || '').toLowerCase();
      return (h === 'solanprinting.github.io') ? 'production' : 'development';
    } catch(e){ return 'development'; }
  })();
  window._solanEnvNow = function(){ return (typeof window._SOLAN_ENV_FORCE === 'string') ? window._SOLAN_ENV_FORCE : window._solanEnv; };
  window._solanIsProd = function(){ return window._solanEnvNow() === 'production'; };
  window._solanWritesAllowed = function(){
    var e = window._solanEnvNow();
    if (e === 'production')  return true;
    if (e === 'development') return window._SOLAN_ALLOW_DEV_WRITES === true;
    return false;                                       // test — לעולם לא
  };
  window._solanIsFbWriteUrl = function(url, method){
    url = String(url == null ? '' : url); method = String(method || 'GET').toUpperCase();
    if (method === 'GET' || method === 'HEAD' || method === 'OPTIONS') return false;   // קריאות תמיד מותרות
    return url.indexOf('firebasedatabase.app') >= 0 || url.indexOf('firebasestorage.googleapis.com') >= 0 || url.indexOf('storage.googleapis.com') >= 0;
  };
  window._fbWriteGuard = function(op){
    if (window._solanWritesAllowed()) return true;
    try { console.warn('⛔ [SOLAN ' + window._solanEnvNow().toUpperCase() + '] כתיבה ל-Firebase נחסמה (הגנת סביבה): ' + op + '\n   לאישור זמני בפיתוח בלבד: window._SOLAN_ALLOW_DEV_WRITES = true'); } catch(e){}
    try { window._solanDevBanner && window._solanDevBanner(); } catch(e){}
    return false;
  };
  window._solanDevBanner = function(){
    if (window._solanIsProd()) return;
    try {
      if (typeof document === 'undefined' || document.getElementById('solan-dev-banner')) return;
      var b = document.createElement('div'); b.id = 'solan-dev-banner';
      b.textContent = '🛠️ סביבת ' + window._solanEnvNow().toUpperCase() + ' — כתיבה ל-Firebase חסומה (הגנה מפני דריסת ייצור)';
      b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:2147483000;background:#b45309;color:#fff;font:700 12px Heebo,Arial;padding:5px 12px;text-align:center;direction:rtl;box-shadow:0 -2px 8px rgba(0,0,0,.3);pointer-events:none';
      (document.body || document.documentElement).appendChild(b);
    } catch(e){}
  };
  try {                                                 // עוטף fetch — כתיבת RTDB/Storage חסומה מחוץ ל-production
    var _of = window.fetch;
    if (_of && !_of._solanGuarded) {
      var wf = function(input, init){
        try {
          var url = (typeof input === 'string') ? input : (input && input.url) || '';
          var method = (init && init.method) || (typeof input !== 'string' && input && input.method) || 'GET';
          if (window._solanIsFbWriteUrl(url, method) && !window._fbWriteGuard(method + ' ' + url))
            return Promise.resolve(new Response('{"error":"blocked-by-solan-env-guard"}', { status: 503, statusText: 'blocked-by-solan-env-guard' }));
        } catch(e){}
        return _of.apply(this, arguments);
      };
      wf._solanGuarded = true; window.fetch = wf;
    }
  } catch(e){}
  try {                                                 // עוטף XMLHttpRequest — העלאות/מחיקות Storage חסומות מחוץ ל-production
    var XP = window.XMLHttpRequest && window.XMLHttpRequest.prototype;
    if (XP && !XP._solanGuarded) {
      var _xopen = XP.open, _xsend = XP.send;
      XP.open = function(method, url){ this._solanMethod = method; this._solanUrl = url; return _xopen.apply(this, arguments); };
      XP.send = function(){
        try {
          if (window._solanIsFbWriteUrl(this._solanUrl, this._solanMethod) && !window._fbWriteGuard((this._solanMethod || '') + ' ' + this._solanUrl)) {
            var self = this;
            setTimeout(function(){ try { self.dispatchEvent(new Event('error')); } catch(e){ if (typeof self.onerror === 'function') try { self.onerror(new Event('error')); } catch(_){} } }, 0);
            return;                                     // בקשה אמיתית לא נשלחת
          }
        } catch(e){}
        return _xsend.apply(this, arguments);
      };
      XP._solanGuarded = true;
    }
  } catch(e){}
  try { if (typeof document !== 'undefined') { if (document.readyState !== 'loading') window._solanDevBanner(); else document.addEventListener('DOMContentLoaded', window._solanDevBanner); } } catch(e){}
})();
// ── App Check (reCAPTCHA v3) — עוטף fetch ומצרף X-Firebase-AppCheck לכל בקשה ל-RTDB.
//    מצב ניטור עד אכיפה בקונסולה; אם ה-SDK נכשל — אין header ושום דבר לא נחסם. ריק = כבוי.
var _APPCHECK_SITEKEY = '6LeYDVMtAAAAAAsc-qvVPz9QvLhIlDBfcYCl-pXI';
window._appCheckReady = null;
window._appCheckInit = function(){
  if (!_APPCHECK_SITEKEY) return Promise.resolve(null);
  if (window._appCheckReady) return window._appCheckReady;
  window._appCheckReady = new Promise(function(resolve){
    function load(src){ return new Promise(function(res, rej){ var s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }
    var base='https://www.gstatic.com/firebasejs/10.12.5/';
    load(base+'firebase-app-compat.js').then(function(){ return load(base+'firebase-app-check-compat.js'); }).then(function(){
      try {
        if (!firebase.apps.length) firebase.initializeApp({ apiKey:_FB_APIKEY, authDomain:'solan-printing.firebaseapp.com', projectId:'solan-printing', databaseURL:_FBURL, appId:'1:1094826649317:web:bd5f5efdc1f8e3ab67160c' });
        var ac=firebase.appCheck(); ac.activate(new firebase.appCheck.ReCaptchaV3Provider(_APPCHECK_SITEKEY), true); resolve(ac);
      } catch(e){ resolve(null); }
    }).catch(function(){ resolve(null); });
  });
  return window._appCheckReady;
};
window._appCheckToken = function(){
  if (!_APPCHECK_SITEKEY) return Promise.resolve(null);
  return window._appCheckInit().then(function(ac){
    if (!ac) return null;
    return Promise.race([ ac.getToken(false).then(function(r){ return (r&&r.token)||null; }).catch(function(){ return null; }), new Promise(function(res){ setTimeout(function(){ res(null); }, 8000); }) ]);
  }).catch(function(){ return null; });
};
(function(){
  var _of = window.fetch;
  window.fetch = function(input, init){
    try {
      var url = (typeof input==='string') ? input : (input && input.url) || '';
      if (_APPCHECK_SITEKEY && url.indexOf('firebasedatabase.app') >= 0) {
        return window._appCheckToken().then(function(ac){
          init = init || {};
          if (ac) { var h = new Headers(init.headers || (typeof input!=='string' && input.headers) || {}); h.set('X-Firebase-AppCheck', ac); init.headers = h; }
          return _of.call(window, input, init);
        });
      }
    } catch(e){}
    return _of.call(window, input, init);
  };
})();
try { window._appCheckToken(); } catch(e){}
var TOKEN = null;

function _tok(){
  var rt = null; try { rt = localStorage.getItem('solanFbAnonRT'); } catch(e){}
  var step = rt
    ? fetch('https://securetoken.googleapis.com/v1/token?key=' + _FB_APIKEY, {
        method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:'grant_type=refresh_token&refresh_token=' + encodeURIComponent(rt)
      }).then(function(r){ return r.ok ? r.json() : Promise.reject(); })
        .then(function(j){ return { t:j.id_token, rt:j.refresh_token }; })
    : Promise.reject();
  return step.catch(function(){
    return fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=' + _FB_APIKEY, {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ returnSecureToken:true })
    }).then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(j){ return { t:j.idToken, rt:j.refreshToken }; });
  }).then(function(a){ try { localStorage.setItem('solanFbAnonRT', a.rt); } catch(e){} return a.t; })
    .catch(function(){ return null; });
}
function fbGet(path){
  return fetch(_FBURL + '/' + path + '.json' + (TOKEN ? '?auth=' + TOKEN : '')).then(function(r){
    if (!r.ok) throw new Error('http ' + r.status);
    return r.json();
  });
}
function fbPut(path, val){
  return fetch(_FBURL + '/' + path + '.json' + (TOKEN ? '?auth=' + TOKEN : ''),
    { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(val) })
    .then(function(r){ return r.ok; }).catch(function(){ return false; });
}
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function norm(s){ return String(s||'').toLowerCase().replace(/[^0-9a-zא-ת ]+/g,' ').replace(/\s+/g,' ').trim(); }

// ── האם זו חוברת אמיתית? רק אז מקפלים/מדפדפים. פוסטר/פלייסמנט/עלון שטוח — לא. ──
function isBooklet(card){
  var pg = parseInt(card.pages, 10);
  if (!isNaN(pg) && pg >= 8) return true;
  var txt = norm((card.type||'') + ' ' + (card.name||''));
  if (/עיתון|חוברת|קטלוג|ספר/.test(txt)) return true;
  if (/פוסטר|פלייסמנט|פלסמנט|מדבק|כרזה/.test(txt)) return false;
  return false;   // ספק — לא מקפלים (פותחים ישירות); עדיף מלהפוך פוסטר לחוברת
}

// ── קבצי לקוח (מערכת האישורים): התאמה לפי שם העבודה מול לקוח/כותרת ──
function customerMatches(card, proofsMap){
  var cn = norm(card.name); if (!cn) return [];
  var out = [];
  Object.keys(proofsMap||{}).forEach(function(pid){
    var rec = proofsMap[pid]; if (!rec) return;
    var viewable = !!rec.fileUrl || (rec.parts && Object.keys(rec.parts).some(function(k){ return rec.parts[k] && rec.parts[k].fileUrl; }));
    if (!viewable) return;
    var fields = [rec.title, rec.customer, ((rec.customer||'') + ' ' + (rec.title||''))];
    var hit = fields.some(function(f){ var fn = norm(f); return fn && fn.length >= 2 && (cn.indexOf(fn) >= 0 || fn.indexOf(cn) >= 0); });
    if (!hit) return;
    var when = rec.approvedAt || 0;
    if (rec.parts) Object.keys(rec.parts).forEach(function(k){ var p=rec.parts[k]; if (p && p.approvedAt > when) when = p.approvedAt; });
    out.push({ id: pid, rec: rec, when: when });
  });
  out.sort(function(a,b){ return b.when - a.when; });
  return out;
}

// ── פרופרים על הכרטיס ──
function collectProofs(card){
  var entries = [];
  if (card.runProofs) Object.keys(card.runProofs).sort().forEach(function(k){
    var rp = card.runProofs[k];
    if (rp && rp.url) entries.push({ key:k, name:rp.name||k, url:rp.url, check:rp.check||null });
  });
  if (card.proofUrl) entries.push({ key:null, name:card.proofName||'פרופר', url:card.proofUrl, check:card.proofCheck||null });
  if (rk) entries = entries.filter(function(e){ return String(e.key) === String(rk); });
  return entries;
}
function _lab(name){
  var s = String(name||'').toLowerCase();
  return {
    tumble:    s.indexOf('מתהפך')>=0 || s.indexOf('tumble')>=0 || s.indexOf('turn')>=0,
    perfector: s.indexOf('פרפקטור')>=0 || s.indexOf('perfector')>=0 || /\bperf\b/.test(s),
    ab:        /a\s*\+\s*b/.test(s) || s.indexOf('a+b')>=0 || /א\s*\+\s*ב/.test(s)
  };
}
function _machineOf(card, runKey){
  if (runKey && card.runs && card.runs.length){
    var n = parseInt(String(runKey).replace(/[^0-9]/g,''),10);
    var r = card.runs.find(function(x){ return x && ('R'+x.num)===String(runKey); }) || (!isNaN(n) ? card.runs[n-1] : null);
    if (r && r.machine) return r.machine;
  }
  return card.machine || '';
}
// יעד לפרופר: חוברת → קיפול; לא-חוברת → פתיחה ישירה (בלי להפוך פוסטר לחוברת)
function proofTarget(card, entry){
  if (!isBooklet(card)) return entry.url;
  var chk = entry.check || null;
  if (chk && chk.imposed === false) return entry.url;
  var lab = _lab(entry.name);
  var pages = chk && chk.pages;
  var sides2;
  if (lab.tumble) sides2 = false;
  else if (lab.perfector || lab.ab) sides2 = true;
  else if (pages === 1) sides2 = false;
  else if (pages >= 2) sides2 = true;
  else sides2 = (_machineOf(card, entry.key).indexOf('8') >= 0);
  var type = sides2 ? '32' : '16p';
  return 'imposition-tool.html?v=6&auto=1&type=' + type
    + '&proofUrl=' + encodeURIComponent(entry.url)
    + '&name=' + encodeURIComponent(entry.name || card.name || 'פרופר');
}

var qs = new URLSearchParams(location.search);
var cid = qs.get('c'), rk = qs.get('r');
var sub = document.getElementById('sub'), body = document.getElementById('body');

function findCard(v){
  var cards = Array.isArray(v) ? v : (v && typeof v === 'object' ? Object.values(v) : []);
  return cards.find(function(x){ return x && String(x.id) === String(cid); });
}
function go(url, msg){
  body.innerHTML = '<div class="spin"></div><div style="font-size:.85rem;color:rgba(255,255,255,.65)">' + esc(msg||'פותח…') + '</div>';
  location.replace(url);
}
// החלטה ראשית: קובץ לקוח קודם (לחוברות), אחר כך פרופר. מחזיר true אם נמצא יעד.
function resolveAndGo(card, proofsMap){
  // חוברת מקופלת שצורפה ידנית לכרטיס (גיליון פרוס + סוג קיפול) — קדימות עליונה
  if (card.bookletSheetUrl && !rk) {
    go('imposition-tool.html?v=6&auto=1&type=' + encodeURIComponent(card.bookletFoldType || '32')
       + '&proofUrl=' + encodeURIComponent(card.bookletSheetUrl)
       + '&name=' + encodeURIComponent(card.bookletName || card.name || 'חוברת'), 'פותח את החוברת המקופלת…');
    return true;
  }
  var booklet = isBooklet(card);
  if (booklet) {
    var cm = customerMatches(card, proofsMap);
    if (cm.length === 1) { go('proof-viewer.html?id=' + encodeURIComponent(cm[0].id), 'פותח את החוברת שהלקוח העלה…'); return true; }
    if (cm.length > 1) {
      body.innerHTML = '<div style="font-size:.9rem;margin-bottom:4px">נמצאו כמה קבצי לקוח — בחר:</div>'
        + cm.map(function(m,i){
            var nm = [m.rec.customer, m.rec.title].filter(Boolean).join(' · ') || 'עיתון';
            return '<button class="btn' + (i>0?' alt':'') + '" data-u="proof-viewer.html?id=' + encodeURIComponent(m.id) + '">📖 ' + esc(nm) + '</button>';
          }).join('');
      body.querySelectorAll('button').forEach(function(b){ b.onclick = function(){ location.href = b.dataset.u; }; });
      return true;
    }
  }
  var entries = collectProofs(card);
  if (entries.length === 1) { go(proofTarget(card, entries[0]), booklet ? 'אין קובץ לקוח — מקפל את הפרופר לחוברת…' : 'פותח את הקובץ…'); return true; }
  if (entries.length > 1) {
    body.innerHTML = '<div style="font-size:.9rem;margin-bottom:4px">לעבודה זו כמה קבצים — בחר ריצה:</div>'
      + entries.map(function(e,i){
          return '<button class="btn' + (i>0?' alt':'') + '" data-i="' + i + '">📖 ' + esc(e.key||'קובץ') + ' — ' + esc(e.name) + '</button>';
        }).join('');
    body.querySelectorAll('button').forEach(function(b){
      b.onclick = function(){ location.href = proofTarget(card, entries[parseInt(b.dataset.i,10)]); };
    });
    return true;
  }
  return false;
}
// אין עדיין קבצים: המתן — בודק גם קבצי לקוח (customerProofs) וגם פרופרים (דרך _rev/cards הזעיר)
function waitForFiles(){
  body.innerHTML = '<div class="spin"></div>'
    + '<div class="wait">⏳ עדיין לא הגיעו קבצים לעבודה זו.<br>'
    + 'ברגע שיגיע קובץ (מהלקוח או פרופר) — הוא ייפתח כאן אוטומטית.<br>'
    + '<span style="font-size:.75rem;color:rgba(255,255,255,.55)">אפשר להשאיר את המסך פתוח או לסרוק שוב מאוחר יותר.</span></div>'
    + '<button class="btn alt" id="chk-now">🔄 בדוק עכשיו</button>';
  var lastRev, ticks = 0, iv;
  function check(force){
    // קבצי לקוח — צומת קטן, נבדק בכל סבב
    fbGet('customerProofs').catch(function(){ return null; }).then(function(cp){
      fetch(_FBURL + '/_rev/cards.json' + (TOKEN ? '?auth=' + TOKEN : ''))
        .then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; })
        .then(function(rv){
          var revChanged = force || lastRev === undefined || rv !== lastRev;
          lastRev = rv;
          if (!revChanged) {
            // הכרטיס לא השתנה — בדוק רק התאמת קובץ לקוח מול הכרטיס שבידינו
            if (window._scanCard && cp && resolveIfReady(window._scanCard, cp)) { if (iv) clearInterval(iv); }
            return;
          }
          fbGet('cards').then(function(v){
            var c = findCard(v); if (!c) return;
            window._scanCard = c;
            if (resolveIfReady(c, cp || {})) { if (iv) clearInterval(iv); }
          }).catch(function(){});
        });
    });
  }
  function resolveIfReady(card, proofsMap){
    var hasCustomer = isBooklet(card) && customerMatches(card, proofsMap).length > 0;
    var hasProof = collectProofs(card).length > 0;
    var hasBooklet = !!card.bookletSheetUrl && !rk;
    if (hasCustomer || hasProof || hasBooklet) { resolveAndGo(card, proofsMap); return true; }
    return false;
  }
  iv = setInterval(function(){ if (++ticks > 90) { clearInterval(iv); return; } check(false); }, 20000);   // עד 30 דק'
  document.getElementById('chk-now').onclick = function(){ check(true); };
  check(false);
}

// ── שלבי גימור נדרשים לפי סוג העבודה (תואם לוגיקת האפליקציה) ──
function _isFullSheet(c){
  var hay = ((c.size||'')+' '+(c.name||'')+' '+(c.type||'')+' '+(c.notes||'')).toLowerCase();
  if (/חצי\s*גיליון/.test(hay)) return false;
  if (/70[\s×x*]?100|100[\s×x*]?70/.test(hay)) return true;
  if (/פוסטר\s*גיליון|גיליון\s*מלא/.test(hay)) return true;
  if (/\bגיליון\b/.test(hay) && !/חצי/.test(hay)) return true;
  return false;
}
function _needsCut(c){ if (c.needsFolding || c.needsBinding || c.noCut || c.noFinishing) return false; return !_isFullSheet(c); }
function _bookletish(c){
  var pages = parseInt(c.pages, 10) || 0;
  if (pages > 4) return true;
  var txt = ((c.type||'') + ' ' + (c.name||'')).toLowerCase();
  return /עיתון|חוברת|קטלוג|מגזין|ספר/.test(txt);
}
function _stagesFor(c){
  if (_bookletish(c)) return ['fold','bind'];          // עיתון/חוברת/יותר מ-4 עמ' → קיפול + כריכה
  if (c.needsFolding && c.needsBinding) return ['fold','bind'];
  if (c.needsBinding) return ['bind'];
  if (c.needsFolding) return ['fold'];
  if (_needsCut(c)) return ['cut'];
  return [];
}
var _STG = { cut:{ btn:'✂️ סמן הושלם בחיתוך', done:'חיתוך' }, fold:{ btn:'📐 סמן כהושלמה בקיפול', done:'קיפול' }, bind:{ btn:'📚 סמן כהושלמה בכריכייה', done:'כריכה' } };
var _scanStages = {};   // מצב שלבים מקומי (מ-scanStages בשרת + אופטימי)
function _stageDone(card, s){ return !!(card[s+'Done'] || (_scanStages[s] && _scanStages[s].done)); }
function _rawUrl(card){
  if (card.bookletSheetUrl) return card.bookletSheetUrl;
  var e = collectProofs(card); if (e.length) return e[0].url;
  return null;
}
function _markStage(card, s){
  var payload = { done:true, at: Date.now(), by:'סריקה' };
  _scanStages[s] = payload;
  fbPut('scanStages/' + encodeURIComponent(String(card.id)) + '/' + s, payload);
  showMenu(card);   // רענון → מציג ✓
}
function showMenu(card){
  var proofsMap = window._scanProofs || {};
  var isBk = isBooklet(card) || !!card.bookletSheetUrl;
  var raw = _rawUrl(card);
  var cm = customerMatches(card, proofsMap);
  var stages = _stagesFor(card);
  var h = '';
  // צפייה
  if (raw || cm.length) h += '<button class="btn" id="m-proof">📄 צפייה בפרופר</button>';
  if (isBk && (raw || cm.length || collectProofs(card).length)) h += '<button class="btn alt" id="m-booklet">📖 צפייה בחוברת לדפדוף</button>';
  // שלבי גימור
  if (stages.length){
    h += '<div style="height:8px"></div>';
    stages.forEach(function(s){
      if (_stageDone(card, s)) h += '<button class="btn" disabled style="background:#16a34a;color:#fff;cursor:default;opacity:1">✓ ' + _STG[s].done + ' הושלם</button>';
      else h += '<button class="btn alt" data-stage="' + s + '">' + _STG[s].btn + '</button>';
    });
  } else {
    h += '<div class="wait" style="font-size:.8rem;margin-top:10px">🖨️ עבודה ללא גימור — מסתיימת אוטומטית עם סיום ההדפסה.</div>';
  }
  if (!raw && !cm.length && !stages.length){ waitForFiles(); return; }
  body.innerHTML = h;
  var pb = document.getElementById('m-proof');
  if (pb) pb.onclick = function(){ if (raw) location.href = raw; else resolveAndGo(card, proofsMap); };
  var bb = document.getElementById('m-booklet');
  if (bb) bb.onclick = function(){ resolveAndGo(card, proofsMap); };   // resolveAndGo מקפל חוברת/פותח קובץ לקוח
  body.querySelectorAll('[data-stage]').forEach(function(b){ b.onclick = function(){ _markStage(card, b.dataset.stage); }; });
}

if (!cid) { sub.textContent = ''; body.innerHTML = '<div class="err">חסר מזהה כרטיס בקישור.</div>'; }
else _tok().then(function(t){
  TOKEN = t;
  return Promise.all([ fbGet('cards'), fbGet('customerProofs').catch(function(){ return {}; }), fbGet('scanStages/' + encodeURIComponent(String(cid))).catch(function(){ return null; }) ]);
}).then(function(res){
  var card = findCard(res[0]);
  if (!card) { sub.textContent = ''; body.innerHTML = '<div class="err">הכרטיס לא נמצא — ייתכן שהעבודה הושלמה ועברה לארכיון.</div>'; return; }
  window._scanCard = card; window._scanProofs = res[1] || {};
  if (res[2] && typeof res[2] === 'object') _scanStages = res[2];
  sub.textContent = card.name || '';
  showMenu(card);   // תפריט אפשרויות (במקום פתיחה אוטומטית איטית של הפרופר)
}).catch(function(e){
  sub.textContent = '';
  body.innerHTML = '<div class="err">שגיאה בטעינה — בדוק חיבור לאינטרנט ונסה שוב.</div>';
});
</script>
